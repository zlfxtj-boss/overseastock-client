<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理 - 海外仓掌柜</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-w: 260px;
            --primary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-bg: #1e1b4b;
            --bg-page: #0f0f23;
            --bg-card: #1a1a2e;
            --border-color: #2d2d44;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
        }
        * { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        body { background: var(--bg-page); color: var(--text-primary); }
        
        .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); position: fixed; left: 0; top: 0; z-index: 100; }
        .main-content { margin-left: var(--sidebar-w); min-height: 100vh; }
        .nav-link-custom { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: var(--text-secondary); text-decoration: none; transition: all 0.2s; margin-bottom: 4px; font-size: 14px; }
        .nav-link-custom:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .nav-link-custom.active { background: rgba(99,102,241,0.15); color: var(--primary); font-weight: 500; }
        
        .top-nav { background: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        .data-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; }
        .data-card-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        
        .table-modern { --bs-table-bg: transparent; --bs-table-hover-bg: rgba(99,102,241,0.1); color: var(--text-primary); }
        .table-modern thead th { background: rgba(99,102,241,0.1); color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border-color); padding: 14px 16px; }
        .table-modern tbody td { border-bottom: 1px solid var(--border-color); padding: 14px 16px; vertical-align: middle; }
        .table-modern tbody tr:hover { background: rgba(99,102,241,0.05); }
        
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .btn-success { background: var(--success); border-color: var(--success); }
        .btn-danger { background: var(--danger); border-color: var(--danger); }
        
        .warehouse-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .warehouse-tab:hover { background: rgba(255,255,255,0.05); }
        .warehouse-tab.active { background: rgba(99,102,241,0.2); color: var(--primary); }
        
        .search-box { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px 16px; color: white; }
        .search-box:focus { outline: none; border-color: var(--primary); }
        
        .badge-warehouse-us { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .badge-warehouse-uk { background: rgba(239,68,68,0.2); color: #ef4444; }
        .badge-warehouse-de { background: rgba(234,179,8,0.2); color: #eab308; }
        
        /* Modal Styles */
        .modal-content { background: var(--bg-card); border: 1px solid var(--border-color); color: white; }
        .modal-header { border-bottom: 1px solid var(--border-color); }
        .modal-footer { border-top: 1px solid var(--border-color); }
        .form-control, .form-select { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: white; }
        .form-control:focus, .form-select:focus { background: rgba(255,255,255,0.08); border-color: var(--primary); color: white; box-shadow: none; }
        .form-label { color: var(--text-secondary); }
        
        /* Image Upload Styles */
        .image-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.02);
        }
        .image-upload-area:hover {
            border-color: var(--primary);
            background: rgba(99,102,241,0.05);
        }
        .image-upload-area.has-image {
            border-style: solid;
            border-color: var(--success);
            padding: 10px;
        }
        .image-preview-container {
            position: relative;
            display: inline-block;
        }
        .image-preview {
            max-width: 120px;
            max-height: 120px;
            border-radius: 8px;
            object-fit: cover;
        }
        .image-remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-remove-btn:hover {
            background: #dc2626;
        }
        
        /* Product Detail Styles */
        .product-image-preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
        }
        .product-thumbnails {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .product-thumb {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .product-thumb:hover, .product-thumb.active {
            border-color: var(--primary);
        }
        
        /* 商品添加/编辑 - 图片区域优化 */
        .product-image-section {
            background: rgba(99,102,241,0.05);
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .product-image-section:hover {
            border-color: var(--primary);
            background: rgba(99,102,241,0.1);
        }
        .product-image-section.has-main-image {
            border-style: solid;
            border-color: var(--success);
            padding: 15px;
        }
        .main-image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            object-fit: cover;
        }
        .upload-hint {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Accessibility - focus styles */
        .btn:focus-visible,
        .nav-link-custom:focus-visible,
        input:focus-visible,
        select:focus-visible,
        .warehouse-tab:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
        
        /* Skip link for accessibility */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            z-index: 1000;
            transition: top 0.3s;
        }
        .skip-link:focus {
            top: 0;
        }

    </style>
</head>
<body>
    <!-- Skip link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" role="navigation" aria-label="Main navigation">
        <div class="p-4 border-bottom" style="border-color: var(--border-color)">
            <div class="d-flex align-items-center gap-3">
                <div class="rounded-3 d-flex align-items-center justify-content-center" style="width:44px;height:44px;background:linear-gradient(135deg,#6366f1,#06b6d4)">
                    <i class="bi bi-box-seam text-white fs-5"></i>
                </div>
                <div>
                    <h5 class="mb-0 text-white fw-semibold" style="font-size:16px">海外仓掌柜</h5>
                    <small class="text-secondary">管理后台</small>
                </div>
            </div>
        </div>
        
        <nav class="mt-4 px-3">
            <div class="mb-4">
                <small class="text-secondary px-3 mb-2 d-block" style="font-size:11px;text-transform:uppercase;letter-spacing:1px">主菜单</small>
                <a href="dashboard.html" class="nav-link-custom">
                    <i class="bi bi-grid-1x2"></i> 仪表盘
                </a>
                <a href="products.html" class="nav-link-custom active">
                    <i class="bi bi-box"></i> 商品管理
                </a>
                <a href="orders.html" class="nav-link-custom">
                    <i class="bi bi-receipt"></i> 订单管理
                </a>
                <a href="warehouse.html" class="nav-link-custom">
                    <i class="bi bi-building"></i> 仓库管理
                </a>
                <a href="customers.html" class="nav-link-custom">
                    <i class="bi bi-people"></i> 客户管理
                </a>
            </div>
            <div class="mb-4">
                <small class="text-secondary px-3 mb-2 d-block" style="font-size:11px;text-transform:uppercase;letter-spacing:1px">预警中心</small>
                <a href="stock-alert.html" class="nav-link-custom">
                    <i class="bi bi-exclamation-triangle"></i> 滞销预警
                </a>
            </div>
            <div class="mb-4">
                <small class="text-secondary px-3 mb-2 d-block" style="font-size:11px;text-transform:uppercase;letter-spacing:1px">设置</small>
                <a href="settings.html" class="nav-link-custom">
                    <i class="bi bi-gear"></i> 系统设置
                </a>
                <a href="index.html" class="nav-link-custom text-danger">
                    <i class="bi bi-box-arrow-right"></i> 退出登录
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content" role="main">
        <header class="top-nav" role="banner">
            <div>
                <h4 class="mb-0 text-white fw-semibold">商品管理</h4>
                <small class="text-secondary">共 <span id="totalProducts">12</span> 个商品</small>
            </div>
            </header>
            <div class="d-flex gap-3">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProductModal">
                    <i class="bi bi-plus-lg me-2"></i>添加商品
                </button>
            </div>
        </div>

        <div class="p-4">
            <!-- Filters -->
            <section class="data-card mb-4" aria-labelledby="filter-heading">
                <div class="data-card-header">
                    <h2 class="mb-0 text-white fw-semibold" id="filter-heading">筛选条件</h2>
                </div>
                <div class="p-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <input type="text" class="form-control" id="searchProduct" placeholder="搜索商品名称或SKU..." aria-label="搜索商品" oninput="filterProducts()">
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" id="filterWarehouse" onchange="filterProducts()">
                                <option value="">全部仓库</option>
                                <option value="us">🇺🇸 美国仓</option>
                                <option value="uk">🇬🇧 英国仓</option>
                                <option value="de">🇩🇪 德国仓</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" id="filterStock" onchange="filterProducts()">
                                <option value="">全部状态</option>
                                <option value="high">库存充足</option>
                                <option value="low">库存紧张</option>
                                <option value="out">已售罄</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-secondary w-100" onclick="resetFilters()">
                                <i class="bi bi-arrow-clockwise me-2"></i>重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Products Table -->
            <section class="data-card" aria-labelledby="products-heading">
                <div class="data-card-header">
                    <h2 class="mb-0 text-white fw-semibold" id="products-heading">商品列表</h2>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-secondary" onclick="exportProducts()">
                            <i class="bi bi-download me-1"></i>导出
                        </button>
                        <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#importModal">
                            <i class="bi bi-upload me-1"></i>批量导入
                        </button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-modern mb-0">
                        <thead>
                            <tr>
                                <th scope="col"><input type="checkbox" class="form-check-input" onchange="toggleAllCheckboxes(this)"></th>
                                <th>商品信息</th>
                                <th>SKU</th>
                                <th>仓库</th>
                                <th>采购价</th>
                                <th>建议零售价</th>
                                <th>库存</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <!-- Products will be rendered here -->
                        </tbody>
                    </table>
                </div>
                <div class="p-3 border-top" style="border-color: var(--border-color)">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-secondary">已选择 <span id="selectedCount">0</span> 项</span>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-danger" onclick="batchDelete()">
                                <i class="bi bi-trash me-1"></i>批量删除
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel" aria-modal="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white" id="addProductModalLabel">
                        <i class="bi bi-plus-circle me-2"></i>添加商品
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <!-- 左侧：图片上传 -->
                        <div class="col-md-4">
                            <div class="product-image-section" id="addImageArea">
                                <input type="file" id="addImageInput" accept="image/*" style="display:none" onchange="previewAddImage(this)">
                                <div id="addImagePlaceholder" style="cursor:pointer" onclick="document.getElementById('addImageInput').click()">
                                    <i class="bi bi-cloud-arrow-up" style="font-size:56px;color:var(--primary)"></i>
                                    <p class="mt-3 mb-1 text-white fw-semibold">点击上传商品主图</p>
                                    <p class="upload-hint mb-1">支持 JPG、PNG 格式</p>
                                    <p class="upload-hint">建议尺寸：800×800 像素</p>
                                </div>
                                <div id="addImagePreviewContainer" class="image-preview-container" style="display:none;position:relative">
                                    <img id="addImagePreview" class="main-image-preview" src="" alt="预览">
                                    <button type="button" class="image-remove-btn" onclick="removeAddImage(event)" style="position:absolute;top:-10px;right:-10px">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <!-- 商品图库 -->
                            <div class="mt-4">
                                <label class="form-label mb-2">商品图库（最多5张）</label>
                                <div class="d-flex gap-2 flex-wrap" id="addMoreImagesContainer">
                                    <button class="btn btn-outline-secondary d-flex align-items-center justify-content-center" onclick="document.getElementById('addMoreImageInput').click()" style="width:70px;height:70px;border-style:dashed">
                                        <i class="bi bi-plus fs-4"></i>
                                    </button>
                                    <input type="file" id="addMoreImageInput" accept="image/*" style="display:none" onchange="previewAddMoreImage(this)" multiple>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 右侧：商品信息 -->
                        <div class="col-md-8">
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <label class="form-label">商品名称 *</label>
                                    <input type="text" class="form-control" id="newProductName" placeholder="请输入商品名称">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">SKU编码 *</label>
                                    <input type="text" class="form-control" id="newProductSku" placeholder="如: PROD-001">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">仓库 *</label>
                                    <select class="form-select" id="newProductWarehouse" onchange="updateAddPriceLabels()">
                                        <option value="us">🇺🇸 美国仓</option>
                                        <option value="uk">🇬🇧 英国仓</option>
                                        <option value="de">🇩🇪 德国仓</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label" id="newProductPriceLabel">采购价 ($) *</label>
                                    <input type="number" class="form-control" id="newProductPrice" placeholder="0.00">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label" id="newProductRetailPriceLabel">建议零售价 ($)</label>
                                    <input type="number" class="form-control" id="newProductRetailPrice" placeholder="0.00">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">库存数量 *</label>
                                    <input type="number" class="form-control" id="newProductStock" placeholder="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">单位</label>
                                    <select class="form-select" id="newProductUnit">
                                        <option value="件">件</option>
                                        <option value="箱">箱</option>
                                        <option value="盒">盒</option>
                                        <option value="个">个</option>
                                        <option value="瓶">瓶</option>
                                        <option value="双">双</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">商品规格</label>
                                    <input type="text" class="form-control" id="newProductSpec" placeholder="如：50ml、U码">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">商品描述</label>
                                    <textarea class="form-control" id="newProductDesc" rows="3" placeholder="请输入商品详细描述..."></textarea>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">备注</label>
                                    <textarea class="form-control" id="newProductNote" rows="2" placeholder="商品备注信息..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="addProduct()">
                        <i class="bi bi-check-lg me-2"></i>确认添加
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Product Modal -->
    <div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="editProductModalLabel" aria-modal="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white" id="editProductModalLabel">
                        <i class="bi bi-pencil me-2"></i>编辑商品
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editProductId">
                    <input type="hidden" id="editProductImage">
                    <div class="row">
                        <!-- 左侧：图片预览 -->
                        <div class="col-md-4">
                            <label class="form-label">当前商品图片</label>
                            <div id="editImageContainer">
                                <img id="editProductImagePreview" class="product-image-preview" src="" alt="商品图片">
                            </div>
                            <div class="mt-3">
                                <label class="form-label">更换图片</label>
                                <div class="image-upload-area" onclick="document.getElementById('editImageInput').click()">
                                    <input type="file" id="editImageInput" accept="image/*" style="display:none" onchange="previewEditImage(this)">
                                    <div id="editImagePlaceholder">
                                        <i class="bi bi-arrow-repeat" style="font-size:32px;color:var(--primary)"></i>
                                        <p class="mt-2 mb-0 text-white">点击更换图片</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 右侧：商品信息 -->
                        <div class="col-md-8">
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <label class="form-label">商品名称 *</label>
                                    <input type="text" class="form-control" id="editProductName">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">SKU编码 *</label>
                                    <input type="text" class="form-control" id="editProductSku">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">仓库 *</label>
                                    <select class="form-select" id="editProductWarehouse" onchange="updateEditPriceLabels()">
                                        <option value="us">🇺🇸 美国仓</option>
                                        <option value="uk">🇬🇧 英国仓</option>
                                        <option value="de">🇩🇪 德国仓</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label" id="editProductPriceLabel">采购价 ($) *</label>
                                    <input type="number" class="form-control" id="editProductPrice">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label" id="editProductRetailPriceLabel">建议零售价 ($)</label>
                                    <input type="number" class="form-control" id="editProductRetailPrice">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">库存数量 *</label>
                                    <input type="number" class="form-control" id="editProductStock">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">单位</label>
                                    <select class="form-select" id="editProductUnit">
                                        <option value="件">件</option>
                                        <option value="箱">箱</option>

    <!-- Import Modal -->

        <div class="modal-dialog">
            <div class="modal-content">

                    <h5 class="modal-title text-white">
                        <i class="bi bi-upload me-2"></i>批量导入商品
                    </h5>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Product Data - 从localStorage加载
        let products = JSON.parse(localStorage.getItem('products') || '[]');

        const warehouseNames = { us: '🇺🇸 美国仓', uk: '🇬🇧 英国仓', de: '🇩🇪 德国仓' };
        const warehouseBadges = { us: 'badge-warehouse-us', uk: 'badge-warehouse-uk', de: 'badge-warehouse-de' };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderProducts();
            updateStats();
        });

        function renderProducts(data = products) {
            const tbody = document.getElementById('productsTableBody');
            document.getElementById('totalProducts').textContent = data.length;
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center text-secondary py-5">暂无商品数据</td></tr>`;
                return;
            }
            
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td><input type="checkbox" class="form-check-input product-checkbox" data-id="${p.id}" onchange="updateSelectedCount()"></td>
                    <td>
                        <div class="d-flex align-items-center gap-3">
                            ${p.image ? `
                                <img src="${p.image}" style="width:40px;height:40px;border-radius:8px;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                                <div class="rounded-2 d-flex align-items-center justify-content-center" style="width:40px;height:40px;background:rgba(99,102,241,0.15);display:none">
                                    📦
                                </div>
                            ` : `
                                <div class="rounded-2 d-flex align-items-center justify-content-center" style="width:40px;height:40px;background:rgba(99,102,241,0.15)">
                                    📦
                                </div>
                            `}
                            <div>
                                <span class="text-white">${p.name}</span>
                                ${p.desc ? `<small class="d-block text-secondary" style="font-size:11px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.desc}</small>` : ''}
                            </div>
                        </div>
                    </td>
                    <td class="text-secondary">${p.sku}</td>
                    <td><span class="badge ${warehouseBadges[p.warehouse]}">${warehouseNames[p.warehouse]}</span></td>
                    <td class="text-success fw-semibold">${warehouseCurrency[p.warehouse]}${p.price}</td>
                    <td class="text-white">${warehouseCurrency[p.warehouse]}${p.retailPrice}</td>
                    <td>
                        <span class="${p.stock > 50 ? 'text-success' : p.stock > 10 ? 'text-warning' : 'text-danger'}">${p.stock}${p.unit || '件'}</span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <button class="btn btn-sm btn-outline-primary" onclick="viewProduct(${p.id})" title="查看详情" aria-label="查看商品详情">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-primary" onclick="editProduct(${p.id})" title="编辑" aria-label="编辑商品">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${p.id})" title="删除" aria-label="删除商品">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterProducts() {
            const search = document.getElementById('searchProduct').value.toLowerCase();
            const warehouse = document.getElementById('filterWarehouse').value;
            const stock = document.getElementById('filterStock').value;
            
            let filtered = products.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search) || p.sku.toLowerCase().includes(search);
                const matchWarehouse = !warehouse || p.warehouse === warehouse;
                const matchStock = !stock || (
                    stock === 'high' ? p.stock > 50 :
                    stock === 'low' ? p.stock <= 50 && p.stock > 0 :
                    stock === 'out' ? p.stock === 0 : true
                );
                return matchSearch && matchWarehouse && matchStock;
            });
            
            renderProducts(filtered);
        }

        function resetFilters() {
            document.getElementById('searchProduct').value = '';
            document.getElementById('filterWarehouse').value = '';
            document.getElementById('filterStock').value = '';
            renderProducts();
        }

        // Image preview functions
        function previewAddImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('addImagePreview').src = e.target.result;
                    document.getElementById('addImagePlaceholder').style.display = 'none';
                    document.getElementById('addImagePreviewContainer').style.display = 'block';
                    document.getElementById('addImageArea').classList.add('has-main-image');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removeAddImage(event) {
            event.stopPropagation();
            document.getElementById('addImageInput').value = '';
            document.getElementById('addImagePreview').src = '';
            document.getElementById('addImagePlaceholder').style.display = 'block';
            document.getElementById('addImagePreviewContainer').style.display = 'none';
            document.getElementById('addImageArea').classList.remove('has-main-image');
        }

        function previewAddMoreImage(input) {
            const container = document.getElementById('addMoreImagesContainer');
            const addBtn = container.querySelector('button');
            
            if (input.files) {
                Array.from(input.files).slice(0, 3).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const div = document.createElement('div');
                        div.className = 'image-preview-container';
                        div.style.width = '60px';
                        div.style.height = '60px';
                        div.innerHTML = `
                            <img src="${e.target.result}" class="image-preview" style="width:60px;height:60px;border-radius:8px">
                        `;
                        container.insertBefore(div, addBtn);
                    };
                    reader.readAsDataURL(file);
                });
            }
        }

        function previewEditImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('editProductImagePreview').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 仓库货币配置
        const warehouseCurrency = { us: '$', uk: '£', de: '€' };
        
        function updateAddPriceLabels() {
            const warehouse = document.getElementById('newProductWarehouse').value;
            const symbol = warehouseCurrency[warehouse];
            document.getElementById('newProductPriceLabel').textContent = `采购价 (${symbol}) *`;
            document.getElementById('newProductRetailPriceLabel').textContent = `建议零售价 (${symbol})`;
        }
        
        function updateEditPriceLabels() {
            const warehouse = document.getElementById('editProductWarehouse').value;
            const symbol = warehouseCurrency[warehouse];
            document.getElementById('editProductPriceLabel').textContent = `采购价 (${symbol}) *`;
            document.getElementById('editProductRetailPriceLabel').textContent = `建议零售价 (${symbol})`;
        }

        // View product detail
        function viewProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            const profit = product.retailPrice - product.price;
            const profitRate = product.price > 0 ? ((profit / product.price) * 100).toFixed(1) : 0;
            
            document.getElementById('productDetailContent').innerHTML = `
                <div class="row">
                    <div class="col-md-5">
                        <img src="${product.image || 'https://via.placeholder.com/400x400?text=No+Image'}" 
                             class="product-image-preview" 
                             alt="${product.name}"
                             onerror="this.src='https://via.placeholder.com/400x400?text=No+Image'">
                        <div class="product-thumbnails">
                            ${product.image ? `<img src="${product.image}" class="product-thumb active" onclick="this.parentElement.previousElementSibling.src=this.src">` : ''}
                            <img src="https://picsum.photos/100/100?random=${id+20}" class="product-thumb">
                            <img src="https://picsum.photos/100/100?random=${id+30}" class="product-thumb">
                        </div>
                    </div>
                    <div class="col-md-7">
                        <h4 class="text-white mb-2">${product.name}</h4>
                        <div class="mb-3">
                            <span class="badge ${warehouseBadges[product.warehouse]} me-2">${warehouseNames[product.warehouse]}</span>
                            <span class="badge bg-secondary">${product.sku}</span>
                        </div>
                        
                        <div class="detail-card p-3 mb-3">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-secondary">采购价</span>
                                <span class="text-success fw-bold fs-5">¥${product.price}</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-secondary">建议零售价</span>
                                <span class="text-white fw-bold fs-5">¥${product.retailPrice}</span>
                            </div>
                            <hr style="border-color:var(--border-color)">
                            <div class="d-flex justify-content-between">
                                <span class="text-secondary">预估利润</span>
                                <span class="text-warning fw-bold">¥${profit} (${profitRate}%)</span>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-secondary">当前库存</span>
                                <span class="${product.stock > 50 ? 'text-success' : product.stock > 10 ? 'text-warning' : 'text-danger'} fw-bold">${product.stock} ${product.unit || '件'}</span>
                            </div>
                            <div class="progress" style="height:8px;background:rgba(255,255,255,0.1)">
                                <div class="progress-bar" style="width:${Math.min(product.stock, 100)}%;background:${product.stock > 50 ? '#10b981' : product.stock > 10 ? '#f59e0b' : '#ef4444'}"></div>
                            </div>
                        </div>
                        
                        ${product.desc ? `
                        <div class="mb-3">
                            <label class="text-secondary d-block mb-2">商品描述</label>
                            <p class="text-white">${product.desc}</p>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            document.getElementById('detailEditBtn').onclick = () => {
                bootstrap.Modal.getInstance(document.getElementById('productDetailModal')).hide();
                editProduct(id);
            };
            
            new bootstrap.Modal(document.getElementById('productDetailModal')).show();
        }

        function addProduct() {
            const name = document.getElementById('newProductName').value.trim();
            const sku = document.getElementById('newProductSku').value.trim();
            const warehouse = document.getElementById('newProductWarehouse').value;
            const price = parseFloat(document.getElementById('newProductPrice').value) || 0;
            const retailPrice = parseFloat(document.getElementById('newProductRetailPrice').value) || 0;
            const stock = parseInt(document.getElementById('newProductStock').value) || 0;
            const unit = document.getElementById('newProductUnit').value;
            const spec = document.getElementById('newProductSpec').value.trim();
            const desc = document.getElementById('newProductDesc').value.trim();
            const note = document.getElementById('newProductNote').value.trim();
            
            if (!name || !sku) {
                alert('请填写必填项：商品名称和SKU');
                return;
            }
            
            // 获取上传的图片
            const imageInput = document.getElementById('addImageInput');
            let image = '';
            if (imageInput.files && imageInput.files[0]) {
                image = URL.createObjectURL(imageInput.files[0]);
            }
            
            const newId = Date.now();
            products.push({ id: newId, name, sku, warehouse, price, retailPrice, stock, unit, image, desc, spec, note });
            
            // 保存到localStorage
            localStorage.setItem('products', JSON.stringify(products));
            
            renderProducts();
            updateStats();
            
            // Clear form
            clearAddForm();
            bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide();
            
            showToast('商品添加成功！');
        }

        function clearAddForm() {
            document.getElementById('newProductName').value = '';
            document.getElementById('newProductSku').value = '';
            document.getElementById('newProductPrice').value = '';
            document.getElementById('newProductRetailPrice').value = '';
            document.getElementById('newProductStock').value = '';
            document.getElementById('newProductSpec').value = '';
            document.getElementById('newProductDesc').value = '';
            document.getElementById('newProductNote').value = '';
            removeAddImage({ stopPropagation: () => {} });
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            document.getElementById('editProductId').value = product.id;
            document.getElementById('editProductName').value = product.name;
            document.getElementById('editProductSku').value = product.sku;
            document.getElementById('editProductWarehouse').value = product.warehouse;
            document.getElementById('editProductPrice').value = product.price;
            document.getElementById('editProductRetailPrice').value = product.retailPrice;
            document.getElementById('editProductStock').value = product.stock;
            document.getElementById('editProductUnit').value = product.unit || '件';
            document.getElementById('editProductSpec').value = product.spec || '';
            document.getElementById('editProductDesc').value = product.desc || '';
            document.getElementById('editProductNote').value = product.note || '';
            
            // Set image
            document.getElementById('editProductImage').value = product.image || '';
            document.getElementById('editProductImagePreview').src = product.image || 'https://via.placeholder.com/400x400?text=No+Image';
            
            new bootstrap.Modal(document.getElementById('editProductModal')).show();
        }

        function saveProduct() {
            const id = parseInt(document.getElementById('editProductId').value);
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            product.name = document.getElementById('editProductName').value.trim();
            product.sku = document.getElementById('editProductSku').value.trim();
            product.warehouse = document.getElementById('editProductWarehouse').value;
            product.price = parseFloat(document.getElementById('editProductPrice').value) || 0;
            product.retailPrice = parseFloat(document.getElementById('editProductRetailPrice').value) || 0;
            product.stock = parseInt(document.getElementById('editProductStock').value) || 0;
            product.unit = document.getElementById('editProductUnit').value;
            product.spec = document.getElementById('editProductSpec').value.trim();
            product.desc = document.getElementById('editProductDesc').value.trim();
            product.note = document.getElementById('editProductNote').value.trim();
            
            // Update image if changed
            const imageInput = document.getElementById('editImageInput');
            if (imageInput.files && imageInput.files[0]) {
                product.image = URL.createObjectURL(imageInput.files[0]);
            }
            
            // 保存到localStorage
            localStorage.setItem('products', JSON.stringify(products));
            
            renderProducts();
            updateStats();
            bootstrap.Modal.getInstance(document.getElementById('editProductModal')).hide();
            showToast('商品信息已保存');
        }

        function deleteProduct(id) {
            if (confirm('确定要删除此商品吗？')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('products', JSON.stringify(products));
                renderProducts();
                updateStats();
                showToast('商品已删除');
            }
        }

        function batchDelete() {
            const selected = document.querySelectorAll('.product-checkbox:checked');
            if (selected.length === 0) {
                alert('请先选择要删除的商品');
                return;
            }
            if (confirm(`确定要删除选中的 ${selected.length} 个商品吗？`)) {
                selected.forEach(cb => {
                    const id = parseInt(cb.dataset.id);
                    products = products.filter(p => p.id !== id);
                });
                renderProducts();
                updateSelectedCount();
                showToast(`已删除 ${selected.length} 个商品`);
            }
        }

        function toggleAllCheckboxes(checkbox) {
            document.querySelectorAll('.product-checkbox').forEach(cb => cb.checked = checkbox.checked);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const selected = document.querySelectorAll('.product-checkbox:checked');
            document.getElementById('selectedCount').textContent = selected.length;
        }

        function exportProducts() {
            showToast('商品数据已导出');
        }

        function importProducts() {
            showToast('商品导入功能开发中');
            bootstrap.Modal.getInstance(document.getElementById('importModal')).hide();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'position-fixed bottom-0 end-0 p-3';
            toast.style.zIndex = '9999';
            toast.innerHTML = `<div class="toast show" role="alert" aria-live="polite" style="background:var(--bg-card);border:1px solid var(--border-color)"><div class="toast-body text-white"><i class="bi bi-check-circle text-success me-2"></i>${message}</div></div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Initial render
        renderProducts();

        // 批量导入功能
        let importData = [];
        
        function handleImportFile(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split('\n').filter(line => line.trim());
                
                if (lines.length < 2) {
                    alert('文件格式错误，请检查CSV文件');
                    return;
                }
                
                // 解析CSV
                const headers = parseCSVLine(lines[0]);
                importData = [];
                
                for (let i = 1; i < lines.length; i++) {
                    const values = parseCSVLine(lines[i]);
                    if (values.length >= 6 && values[0] && values[1]) {
                        const row = {};
                        headers.forEach((h, idx) => row[h.trim()] = values[idx] ? values[idx].trim() : '');
                        importData.push(row);
                    }
                }
                
                // 显示预览
                const previewDiv = document.getElementById('importPreview');
                const thead = document.getElementById('importPreviewHead');
                const tbody = document.getElementById('importPreviewBody');
                
                thead.innerHTML = '<tr>' + headers.slice(0, 6).map(h => '<th>' + h + '</th>').join('') + '<th>状态</th></tr>';
                tbody.innerHTML = importData.map((row, idx) => {
                    const status = validateRow(row) ? '<span class="text-success">✓</span>' : '<span class="text-danger">✗ 数据不全</span>';
                    return '<tr>' + headers.slice(0, 6).map(h => '<td>' + (row[h] || '-') + '</td>').join('') + '<td>' + status + '</td></tr>';
                }).join('');
                
                document.getElementById('importCount').textContent = importData.length;
                previewDiv.classList.remove('d-none');
            };
            reader.readAsText(file);
        }
        
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }
        
        function validateRow(row) {
            return row['商品名称'] && row['SKU'] && row['仓库'] && 
                   row['采购价'] && row['库存数量'];
        }
        
        function confirmImport() {
            const validData = importData.filter(validateRow);
            
            if (validData.length === 0) {
                alert('没有有效数据可导入');
                return;
            }
            
            const warehouseMap = { '美国仓': 'us', '英国仓': 'uk', '德国仓': 'de' };
            
            const existingProducts = JSON.parse(localStorage.getItem('products') || '[]');
            let addedCount = 0;
            
            validData.forEach(row => {
                const product = {
                    id: Date.now() + addedCount,
                    name: row['商品名称'] || '',
                    sku: row['SKU'] || row['SKU编码'] || '',
                    warehouse: warehouseMap[row['仓库']] || 'us',
                    price: parseFloat(row['采购价']) || 0,
                    retailPrice: parseFloat(row['建议零售价']) || 0,
                    stock: parseInt(row['库存数量']) || 0,
                    unit: '件',
                    spec: '',
                    desc: row['商品描述'] || '',
                    note: '',
                    image: '',
                    images: [],
                    createdAt: new Date().toISOString()
                };
                existingProducts.push(product);
                addedCount++;
            });
            
            localStorage.setItem('products', JSON.stringify(existingProducts));
            
            // 关闭modal
            bootstrap.Modal.getInstance(document.getElementById('importModal')).hide();
            
            // 刷新列表
            renderProducts();
            updateStats();
            
            alert('成功导入 ' + addedCount + ' 条商品数据！');
            
            // 清空预览
            document.getElementById('importPreview').classList.add('d-none');
            document.getElementById('importFileInput').value = '';
            importData = [];
        }
        
        function exportProducts() {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            
            if (products.length === 0) {
                alert('没有商品数据可导出');
                return;
            }
            
            const warehouseMap = { us: '美国仓', uk: '英国仓', de: '德国仓' };
            
            let csv = '商品名称,SKU编码,仓库,采购价,建议零售价,库存数量,单位,规格,商品描述,备注\n';
            
            products.forEach(p => {
                csv += '"' + (p.name || '') + '",';
                csv += '"' + (p.sku || '') + '",';
                csv += '"' + (warehouseMap[p.warehouse] || p.warehouse) + '",';
                csv += '"' + (p.price || 0) + '",';
                csv += '"' + (p.retailPrice || 0) + '",';
                csv += '"' + (p.stock || 0) + '",';
                csv += '"' + (p.unit || '件') + '",';
                csv += '"' + (p.spec || '') + '",';
                csv += '"' + (p.desc || '') + '",';
                csv += '"' + (p.note || '') + '"';
                csv += '\n';
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '商品数据_' + new Date().toISOString().split('T')[0] + '.csv';
            link.click();
        }

    </script>
</body>
</html>
