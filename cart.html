<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购单 - 海外仓掌柜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        dark: '#0f0f23',
                        darker: '#080814',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        .glass { background: rgba(30,27,75,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }

        /* Accessibility */
        .skip-link { position: absolute; top: -40px; left: 0; background: var(--primary); color: white; padding: 8px 16px; z-index: 1000; transition: top 0.3s; }
        .skip-link:focus { top: 0; }
        .btn:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    </style>
</head>
<body class="bg-darker min-h-screen">
    <!-- Header -->
    <header class="glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3" onclick="location.href='products.html'" style="cursor:pointer">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-accent rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-white font-semibold">海外仓掌柜</h1>
                        <p class="text-gray-500 text-xs">客户端采购平台</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="location.href='products.html'" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                        </svg>
                        继续采购
                    </button>
                    <div class="flex items-center gap-2 pl-4 border-l border-white/10">
                        <div class="w-8 h-8 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-white text-sm font-medium">S</div>
                        <span class="text-white text-sm">shayu01</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" role="main" class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-white mb-6">采购单</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Cart Items -->
            <div class="lg:col-span-2 space-y-4" id="cartItems">
                <!-- Items will be rendered here -->
            </div>

            <!-- Order Summary -->
            <div class="lg:col-span-1">
                <div class="glass rounded-2xl p-6 sticky top-28">
                    <h3 class="text-white font-semibold mb-6">采购单摘要</h3>
                    
                    <div class="space-y-4 text-sm">
                        <div class="flex justify-between">
                            <span class="text-gray-400">商品种类</span>
                            <span class="text-white" id="itemTypes">0 种</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">商品总数</span>
                            <span class="text-white" id="totalItems">0 件</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">采购总额</span>
                            <span class="text-white" id="totalAmount">¥0</span>
                        </div>
                    </div>

                    <div class="mt-6 p-4 bg-accent/10 rounded-xl border border-accent/20">
                        <p class="text-accent text-sm">
                            <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            提交订单后，待管理员确认发货
                        </p>
                    </div>

                    <button onclick="goCheckout()" class="w-full mt-6 bg-gradient-to-r from-primary to-secondary text-white py-4 rounded-xl font-semibold transition-all hover:opacity-90 flex items-center justify-center gap-2">
                        <span>确认采购</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                        </svg>
                    </button>

                    <button onclick="location.href='products.html'" class="w-full mt-3 bg-white/5 hover:bg-white/10 text-gray-400 hover:text-white py-3 rounded-xl font-medium transition-all">
                        返回继续采购
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-red-500/90 text-white px-6 py-3 rounded-xl shadow-2xl z-50 hidden flex items-center gap-3">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        <span id="toastMsg">商品已删除</span>
    </div>

    <script>
        const warehouseNames = { us: '🇺🇸 美国仓', uk: '🇬🇧 英国仓', de: '🇩🇪 德国仓' };

        // 获取购物车
        function getCart() {
            const cart = localStorage.getItem('overseasCart');
            return cart ? JSON.parse(cart) : [];
        }

        // 保存购物车
        function saveCart(cart) {
            localStorage.setItem('overseasCart', JSON.stringify(cart));
        }

        // 渲染购物车
        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cartItems');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="glass rounded-2xl p-12 text-center">
                        <div class="text-6xl mb-4">🛒</div>
                        <p class="text-gray-400 mb-4">采购单是空的</p>
                        <button onclick="location.href='products.html'" class="bg-primary hover:bg-primary/80 text-white px-6 py-3 rounded-xl font-medium transition-colors">
                            去选购商品
                        </button>
                    </div>
                `;
                updateSummary();
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="glass rounded-2xl p-5">
                    <div class="flex gap-5">
                        <div class="w-24 h-24 bg-gradient-to-br from-white/5 to-white/10 rounded-xl flex items-center justify-center text-4xl flex-shrink-0">
                            ${item.image}
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-white font-medium">${item.name}</h3>
                                    <p class="text-gray-500 text-sm mt-1">${item.sku} · ${warehouseNames[item.warehouse]}</p>
                                </div>
                                <button onclick="removeItem(${index})" class="text-gray-500 hover:text-red-400 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="flex justify-between items-end mt-3">
                                <div class="text-sm">
                                    <span class="text-gray-500">采购价: </span>
                                    <span class="text-accent font-semibold">${item.currency}${item.price.toFixed(2)}</span>
                                    <span class="text-gray-500 ml-3">小计: </span>
                                    <span class="text-white font-semibold">${item.currency}${(item.price * item.qty).toFixed(2)}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button onclick="updateQty(${index}, -1)" class="w-8 h-8 bg-white/5 rounded-lg flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                                        </svg>
                                    </button>
                                    <input type="number" value="${item.qty}" min="1" onchange="setQty(${index}, this.value)" class="w-16 bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-white text-center text-sm focus:outline-none focus:border-primary/50">
                                    <button onclick="updateQty(${index}, 1)" class="w-8 h-8 bg-white/5 rounded-lg flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                                        </svg>
                                    </button>
                                    <span class="text-gray-500 text-sm ml-2">${item.unit}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            updateSummary();
        }

        // 更新数量
        function updateQty(index, delta) {
            const cart = getCart();
            cart[index].qty = Math.max(1, cart[index].qty + delta);
            saveCart(cart);
            renderCart();
        }

        // 设置数量
        function setQty(index, value) {
            const cart = getCart();
            cart[index].qty = Math.max(1, parseInt(value) || 1);
            saveCart(cart);
            renderCart();
        }

        // 删除商品
        function removeItem(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            showToast('商品已删除');
            renderCart();
        }

        // 显示提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        // 更新摘要
        function updateSummary() {
            const cart = getCart();
            const itemTypes = cart.length;
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);

            // 按货币分组统计
            const byCurrency = {};
            cart.forEach(item => {
                if (!byCurrency[item.currency]) {
                    byCurrency[item.currency] = { name: item.currencyName, total: 0 };
                }
                byCurrency[item.currency].total += item.price * item.qty;
            });

            // 生成总额显示文本
            const totals = Object.entries(byCurrency).map(([sym, data]) =>
                `${sym}${data.total.toFixed(2)} ${data.name}`
            ).join(' + ');

            document.getElementById('itemTypes').textContent = itemTypes + ' 种';
            document.getElementById('totalItems').textContent = totalItems + ' 件';
            document.getElementById('totalAmount').textContent = totals || '¥0';
        }

        // 去结算
        function goCheckout() {
            const cart = getCart();
            if (cart.length === 0) {
                showToast('采购单是空的');
                return;
            }
            window.location.href = 'checkout.html';
        }

        renderCart();
    </script>
</body>
</html>
