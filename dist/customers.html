<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理 - 海外仓掌柜</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-w: 260px;
            --primary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-bg: #1e1b4b;
            --bg-page: #0f0f23;
            --bg-card: #1a1a2e;
            --border-color: #2d2d44;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
        }
        * { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        body { background: var(--bg-page); color: var(--text-primary); }
        
        .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); position: fixed; left: 0; top: 0; z-index: 100; }
        .main-content { margin-left: var(--sidebar-w); min-height: 100vh; }
        .nav-link-custom { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: var(--text-secondary); text-decoration: none; transition: all 0.2s; margin-bottom: 4px; font-size: 14px; }
        .nav-link-custom:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .nav-link-custom.active { background: rgba(99,102,241,0.15); color: var(--primary); font-weight: 500; }
        
        .top-nav { background: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        .data-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; }
        .data-card-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        
        .table-modern { --bs-table-bg: transparent; --bs-table-hover-bg: rgba(99,102,241,0.1); color: var(--text-primary); }
        .table-modern thead th { background: rgba(99,102,241,0.1); color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border-color); padding: 14px 16px; }
        .table-modern tbody td { border-bottom: 1px solid var(--border-color); padding: 14px 16px; vertical-align: middle; }
        
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        
        .customer-avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        
        .badge-vip { background: rgba(234,179,8,0.2); color: #eab308; }
        .badge-normal { background: rgba(99,102,241,0.2); color: #6366f1; }
        
        .modal-content { background: var(--bg-card); border: 1px solid var(--border-color); color: white; }
        .modal-header { border-bottom: 1px solid var(--border-color); }
        .modal-footer { border-top: 1px solid var(--border-color); }
        .form-control, .form-select { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: white; }
        .form-control:focus, .form-select:focus { background: rgba(255,255,255,0.08); border-color: var(--primary); color: white; box-shadow: none; }
        .form-label { color: var(--text-secondary); }
        
        .stat-mini { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 10px; padding: 16px; text-align: center; }

        /* Accessibility */
        .skip-link { position: absolute; top: -40px; left: 0; background: var(--primary); color: white; padding: 8px 16px; z-index: 1000; transition: top 0.3s; }
        .skip-link:focus { top: 0; }
        .btn:focus-visible, .nav-link-custom:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <!-- Sidebar Navigation -->
    <aside class="sidebar" role="navigation" aria-label="Main navigation">
        <div class="p-4 border-bottom" style="border-color: var(--border-color)">
            <div class="d-flex align-items-center gap-3">
                <div class="rounded-3 d-flex align-items-center justify-content-center" style="width:44px;height:44px;background:linear-gradient(135deg,#6366f1,#06b6d4)">
                    <i class="bi bi-box-seam text-white fs-5"></i>
                </div>
                <div>
                    <h5 class="mb-0 text-white fw-semibold" style="font-size:16px">海外仓掌柜</h5>
                    <small class="text-secondary">管理后台</small>
                </div>
            </div>
        </div>
        
        <nav class="mt-4 px-3">
            <div class="mb-4">
                <small class="text-secondary px-3 mb-2 d-block" style="font-size:11px;text-transform:uppercase;letter-spacing:1px">主菜单</small>
                <a href="dashboard.html" class="nav-link-custom">
                    <i class="bi bi-grid-1x2"></i> 仪表盘
                </a>
                <a href="products.html" class="nav-link-custom">
                    <i class="bi bi-box"></i> 商品管理
                </a>
                <a href="orders.html" class="nav-link-custom">
                    <i class="bi bi-receipt"></i> 订单管理
                </a>
                <a href="warehouse.html" class="nav-link-custom">
                    <i class="bi bi-building"></i> 仓库管理
                </a>
                <a href="customers.html" class="nav-link-custom active">
                    <i class="bi bi-people"></i> 客户管理
                </a>
            </div>
            <div class="mb-4">
                <small class="text-secondary px-3 mb-2 d-block" style="font-size:11px;text-transform:uppercase;letter-spacing:1px">预警中心</small>
                <a href="stock-alert.html" class="nav-link-custom">
                    <i class="bi bi-exclamation-triangle"></i> 滞销预警
                </a>
            </div>
            <div class="mb-4">
                <small class="text-secondary px-3 mb-2 d-block" style="font-size:11px;text-transform:uppercase;letter-spacing:1px">设置</small>
                <a href="settings.html" class="nav-link-custom">
                    <i class="bi bi-gear"></i> 系统设置
                </a>
                <a href="index.html" class="nav-link-custom text-danger">
                    <i class="bi bi-box-arrow-right"></i> 退出登录
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content" role="main">
        <header class="top-nav" role="banner">
            <div>
                <h4 class="mb-0 text-white fw-semibold">客户管理</h4>
                <small class="text-secondary">共 <span id="totalCustomers">10</span> 位客户</small>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary" onclick="exportCustomers()">
                    <i class="bi bi-download me-2"></i>导出
                </button>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCustomerModal">
                    <i class="bi bi-person-plus me-2"></i>添加客户
                </button>
            </div>
        </div>

        <div class="p-4">
            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-md-3 col-6">
                    <div class="stat-mini">
                        <div class="text-white fw-bold" style="font-size:24px">10</div>
                        <div class="text-secondary" style="font-size:12px">客户总数</div>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="stat-mini">
                        <div class="text-warning fw-bold" style="font-size:24px">3</div>
                        <div class="text-secondary" style="font-size:12px">VIP客户</div>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="stat-mini">
                        <div class="text-success fw-bold" style="font-size:24px">¥89,450</div>
                        <div class="text-secondary" style="font-size:12px">总消费额</div>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="stat-mini">
                        <div class="text-primary fw-bold" style="font-size:24px">156</div>
                        <div class="text-secondary" style="font-size:12px">总订单数</div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="data-card mb-4">
                <div class="data-card-header">
                    <h5 class="mb-0 text-white fw-semibold">筛选条件</h5>
                </div>
                <div class="p-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <input type="text" class="form-control" id="searchCustomer" placeholder="搜索客户名称或手机号..." oninput="filterCustomers()">
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" id="filterLevel" onchange="filterCustomers()">
                                <option value="">全部级别</option>
                                <option value="vip">VIP客户</option>
                                <option value="normal">普通客户</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-secondary w-100" onclick="resetCustomerFilters()">
                                <i class="bi bi-arrow-clockwise me-2"></i>重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Customers Table -->
            <div class="data-card">
                <div class="data-card-header">
                    <h5 class="mb-0 text-white fw-semibold">客户列表</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-modern mb-0">
                        <thead>
                            <tr>
                                <th>客户信息</th>
                                <th>联系电话</th>
                                <th>客户级别</th>
                                <th>累计订单</th>
                                <th>累计消费</th>
                                <th>最近下单</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="customersTableBody">
                            <!-- Customers will be rendered here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Customer Modal -->
    <div class="modal fade" id="addCustomerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white">
                        <i class="bi bi-person-plus me-2"></i>添加客户
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">客户名称 *</label>
                        <input type="text" class="form-control" id="newCustomerName" placeholder="请输入客户名称">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">用户名 *</label>
                            <input type="text" class="form-control" id="newCustomerUsername" placeholder="登录用户名">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">密码 *</label>
                            <input type="password" class="form-control" id="newCustomerPassword" placeholder="登录密码">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">联系电话 *</label>
                        <input type="text" class="form-control" id="newCustomerPhone" placeholder="请输入手机号">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">客户级别</label>
                        <select class="form-select" id="newCustomerLevel">
                            <option value="normal">普通客户</option>
                            <option value="vip">VIP客户</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">收货地址</label>
                        <textarea class="form-control" rows="2" id="newCustomerAddress" placeholder="请输入收货地址"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" rows="2" id="newCustomerNote" placeholder="备注信息..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="addCustomer()">
                        <i class="bi bi-check-lg me-2"></i>确认添加
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Customer Detail Modal -->
    <div class="modal fade" id="customerDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white">
                        <i class="bi bi-person me-2"></i>客户详情
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="customerDetailContent">
                    <!-- Customer detail will be rendered here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" onclick="saveCustomer()">
                        <i class="bi bi-check-lg me-2"></i>保存修改
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 从localStorage加载客户数据
        let customers = JSON.parse(localStorage.getItem('customers') || '[]');

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderCustomers();
        });

        function renderCustomers(data = customers) {
            const tbody = document.getElementById('customersTableBody');
            document.getElementById('totalCustomers').textContent = data.length;
            
            tbody.innerHTML = data.map(c => `
                <tr>
                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <div class="customer-avatar" style="background:${c.level === 'vip' ? 'rgba(234,179,8,0.2)' : 'rgba(99,102,241,0.2)'}">
                                <span style="color:${c.level === 'vip' ? '#eab308' : '#6366f1'}">${c.name.charAt(0)}</span>
                            </div>
                            <span class="text-white">${c.name}</span>
                        </div>
                    </td>
                    <td class="text-secondary">${c.phone}</td>
                    <td><span class="badge ${c.level === 'vip' ? 'badge-vip' : 'badge-normal'}">${c.level === 'vip' ? '⭐ VIP' : '普通'}</span></td>
                    <td>${c.orders} 单</td>
                    <td class="text-success fw-semibold">¥${c.total.toLocaleString()}</td>
                    <td class="text-secondary">${c.lastOrder}</td>
                    <td>
                        <div class="d-flex gap-1">
                            <button class="btn btn-sm btn-outline-primary" onclick="viewCustomer(${c.id})" title="查看">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteCustomer(${c.id})" title="删除">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterCustomers() {
            const search = document.getElementById('searchCustomer').value.toLowerCase();
            const level = document.getElementById('filterLevel').value;
            
            let filtered = customers.filter(c => {
                const matchSearch = c.name.toLowerCase().includes(search) || c.phone.includes(search);
                const matchLevel = !level || c.level === level;
                return matchSearch && matchLevel;
            });
            
            renderCustomers(filtered);
        }

        function resetCustomerFilters() {
            document.getElementById('searchCustomer').value = '';
            document.getElementById('filterLevel').value = '';
            renderCustomers();
        }

        function viewCustomer(id) {
            const customer = customers.find(c => c.id === id);
            if (!customer) return;
            
            document.getElementById('customerDetailContent').innerHTML = `
                <div class="text-center mb-4">
                    <div class="customer-avatar mx-auto mb-3" style="width:80px;height:80px;font-size:32px;background:${customer.level === 'vip' ? 'rgba(234,179,8,0.2)' : 'rgba(99,102,241,0.2)'}">
                        <span style="color:${customer.level === 'vip' ? '#eab308' : '#6366f1'}">${customer.name.charAt(0)}</span>
                    </div>
                    <h4 class="text-white mb-1">${customer.name}</h4>
                    <span class="badge ${customer.level === 'vip' ? 'badge-vip' : 'badge-normal'}">${customer.level === 'vip' ? '⭐ VIP客户' : '普通客户'}</span>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <h6 class="text-secondary mb-3">基本信息</h6>
                        <div class="mb-2"><span class="text-secondary">联系电话：</span>${customer.phone}</div>
                        <div class="mb-2"><span class="text-secondary">收货地址：</span>${customer.address}</div>
                    </div>
                    <div class="col-md-6">
                        <h6 class="text-secondary mb-3">消费统计</h6>
                        <div class="mb-2"><span class="text-secondary">累计订单：</span>${customer.orders} 单</div>
                        <div class="mb-2"><span class="text-secondary">累计消费：</span><span class="text-success fw-bold">¥${customer.total.toLocaleString()}</span></div>
                        <div class="mb-2"><span class="text-secondary">最近下单：</span>${customer.lastOrder}</div>
                    </div>
                </div>
            `;
            
            new bootstrap.Modal(document.getElementById('customerDetailModal')).show();
        }

        function saveCustomer() {
            bootstrap.Modal.getInstance(document.getElementById('customerDetailModal')).hide();
            showToast('客户信息已保存');
        }

        function addCustomer() {
            const name = document.getElementById('newCustomerName').value.trim();
            const username = document.getElementById('newCustomerUsername').value.trim();
            const password = document.getElementById('newCustomerPassword').value.trim();
            const phone = document.getElementById('newCustomerPhone').value.trim();
            const level = document.getElementById('newCustomerLevel').value;
            const address = document.getElementById('newCustomerAddress').value.trim();
            const note = document.getElementById('newCustomerNote').value.trim();

            if (!name || !username || !password || !phone) {
                alert('请填写必填项（客户名称、用户名、密码、联系电话）');
                return;
            }

            // 检查用户名是否已存在
            if (customers.some(c => c.username === username)) {
                alert('用户名已存在，请使用其他用户名');
                return;
            }

            const newId = Date.now();
            const newCustomer = { 
                id: newId, 
                name, 
                username, 
                password, // 注意：实际应用中应该加密存储
                phone, 
                level, 
                orders: 0, 
                total: 0, 
                lastOrder: '-', 
                address: address || '-',
                note: note || '',
                createdAt: new Date().toISOString()
            };
            
            customers.push(newCustomer);
            localStorage.setItem('customers', JSON.stringify(customers));
            renderCustomers();

            // 清空表单
            document.getElementById('newCustomerName').value = '';
            document.getElementById('newCustomerUsername').value = '';
            document.getElementById('newCustomerPassword').value = '';
            document.getElementById('newCustomerPhone').value = '';
            document.getElementById('newCustomerLevel').value = 'normal';
            document.getElementById('newCustomerAddress').value = '';
            document.getElementById('newCustomerNote').value = '';

            bootstrap.Modal.getInstance(document.getElementById('addCustomerModal')).hide();
            showToast('客户添加成功');
        }

        function deleteCustomer(id) {
            if (confirm('确定要删除这个客户吗？')) {
                customers = customers.filter(c => c.id !== id);
                localStorage.setItem('customers', JSON.stringify(customers));
                renderCustomers();
                showToast('客户已删除');
            }
        }

        function exportCustomers() {
            showToast('客户数据已导出');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'position-fixed bottom-0 end-0 p-3';
            toast.style.zIndex = '9999';
            toast.innerHTML = `<div class="toast show" role="alert" aria-live="polite" style="background:var(--bg-card);border:1px solid var(--border-color)"><div class="toast-body text-white"><i class="bi bi-check-circle text-success me-2"></i>${message}</div></div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        renderCustomers();
    </script>
</body>
</html>
