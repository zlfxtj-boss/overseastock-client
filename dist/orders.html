<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - 海外仓掌柜</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-w: 260px;
            --primary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-bg: #1e1b4b;
            --bg-page: #0f0f23;
            --bg-card: #1a1a2e;
            --border-color: #2d2d44;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
        }
        * { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        body { background: var(--bg-page); color: var(--text-primary); }
        
        .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); position: fixed; left: 0; top: 0; z-index: 100; }
        .main-content { margin-left: var(--sidebar-w); min-height: 100vh; }
        .nav-link-custom { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: var(--text-secondary); text-decoration: none; transition: all 0.2s; margin-bottom: 4px; font-size: 14px; }
        .nav-link-custom:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .nav-link-custom.active { background: rgba(99,102,241,0.15); color: var(--primary); font-weight: 500; }
        
        .top-nav { background: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        .data-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; }
        .data-card-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        
        .table-modern { --bs-table-bg: transparent; --bs-table-hover-bg: rgba(99,102,241,0.1); color: var(--text-primary); }
        .table-modern thead th { background: rgba(99,102,241,0.1); color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border-color); padding: 14px 16px; }
        .table-modern tbody td { border-bottom: 1px solid var(--border-color); padding: 14px 16px; vertical-align: middle; }
        .table-modern tbody tr:hover { background: rgba(99,102,241,0.08); cursor: pointer; }
        
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .btn-success { background: var(--success); border-color: var(--success); }
        
        .badge-status { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-pending { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .badge-processing { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .badge-shipped { background: rgba(16,185,129,0.2); color: #10b981; }
        .badge-completed { background: rgba(99,102,241,0.2); color: #6366f1; }
        .badge-cancelled { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        .warehouse-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; }
        .badge-warehouse-us { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .badge-warehouse-uk { background: rgba(239,68,68,0.2); color: #ef4444; }
        .badge-warehouse-de { background: rgba(234,179,8,0.2); color: #eab308; }
        
        .modal-content { background: var(--bg-card); border: 1px solid var(--border-color); color: white; }
        .modal-header { border-bottom: 1px solid var(--border-color); }
        .modal-footer { border-top: 1px solid var(--border-color); }
        .form-control, .form-select { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: white; }
        .form-control:focus, .form-select:focus { background: rgba(255,255,255,0.08); border-color: var(--primary); color: white; box-shadow: none; }
        .form-label { color: var(--text-secondary); }
        
        .stat-mini { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 10px; padding: 16px; text-align: center; }
        .stat-mini-value { font-size: 24px; font-weight: 700; color: white; }
        .stat-mini-label { font-size: 12px; color: var(--text-secondary); }
        
        /* Detail Card Styles */
        .detail-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; }
        .detail-card-title { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .detail-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .detail-item:last-child { border-bottom: none; }
        .detail-label { color: var(--text-secondary); }
        .detail-value { color: var(--text-primary); font-weight: 500; }
        
        .action-box { background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(6,182,212,0.2)); border: 2px dashed var(--primary); border-radius: 12px; padding: 20px; text-align: center; }
        .action-box-pending { background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(234,179,8,0.15)); border-color: #f59e0b; }
        .action-box-shipped { background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(6,182,212,0.15)); border-color: #10b981; }

        /* Accessibility */
        .skip-link { position: absolute; top: -40px; left: 0; background: var(--primary); color: white; padding: 8px 16px; z-index: 1000; transition: top 0.3s; }
        .skip-link:focus { top: 0; }
        .btn:focus-visible, .nav-link-custom:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" role="navigation" aria-label="Main navigation">
        <div class="p-4 border-bottom" style="border-color: var(--border-color)">
            <div class="d-flex align-items-center gap-3">
                <div class="rounded-3 d-flex align-items-center justify-content-center" style="width:44px;height:44px;background:linear-gradient(135deg,#6366f1,#06b6d4)">
                    <i class="bi bi-box-seam text-white fs-5"></i>
                </div>
                <div>
                    <h5 class="mb-0 text-white fw-semibold" style="font-size:16px">海外仓掌柜</h5>
                    <small class="text-secondary">管理后台</small>
                </div>
            </div>
        </div>
        
        <nav class="mt-4 px-3">
            <div class="mb-4">
                <small class="text-secondary px-3 mb-2 d-block" style="font-size:11px;text-transform:uppercase;letter-spacing:1px">主菜单</small>
                <a href="dashboard.html" class="nav-link-custom">
                    <i class="bi bi-grid-1x2"></i> 仪表盘
                </a>
                <a href="products.html" class="nav-link-custom">
                    <i class="bi bi-box"></i> 商品管理
                </a>
                <a href="orders.html" class="nav-link-custom active">
                    <i class="bi bi-receipt"></i> 订单管理
                </a>
                <a href="warehouse.html" class="nav-link-custom">
                    <i class="bi bi-building"></i> 仓库管理
                </a>
                <a href="customers.html" class="nav-link-custom">
                    <i class="bi bi-people"></i> 客户管理
                </a>
            </div>
            <div class="mb-4">
                <small class="text-secondary px-3 mb-2 d-block" style="font-size:11px;text-transform:uppercase;letter-spacing:1px">预警中心</small>
                <a href="stock-alert.html" class="nav-link-custom">
                    <i class="bi bi-exclamation-triangle"></i> 滞销预警
                </a>
            </div>
            <div class="mb-4">
                <small class="text-secondary px-3 mb-2 d-block" style="font-size:11px;text-transform:uppercase;letter-spacing:1px">设置</small>
                <a href="settings.html" class="nav-link-custom">
                    <i class="bi bi-gear"></i> 系统设置
                </a>
                <a href="index.html" class="nav-link-custom text-danger">
                    <i class="bi bi-box-arrow-right"></i> 退出登录
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content" role="main">
        <header class="top-nav" role="banner">
            <div>
                <h4 class="mb-0 text-white fw-semibold">订单管理</h4>
                <small class="text-secondary">共 <span id="totalOrders">15</span> 个订单 · 点击任意订单查看详情</small>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary" onclick="batchShip()">
                    <i class="bi bi-truck me-2"></i>批量发货
                </button>
            </div>
        </div>

        <div class="p-4">
            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-md-2 col-6">
                    <div class="stat-mini">
                        <div class="stat-mini-value text-warning">8</div>
                        <div class="stat-mini-label">待处理</div>
                    </div>
                </div>
                <div class="col-md-2 col-6">
                    <div class="stat-mini">
                        <div class="stat-mini-value text-primary">5</div>
                        <div class="stat-mini-label">处理中</div>
                    </div>
                </div>
                <div class="col-md-2 col-6">
                    <div class="stat-mini">
                        <div class="stat-mini-value text-success">12</div>
                        <div class="stat-mini-label">已发货</div>
                    </div>
                </div>
                <div class="col-md-2 col-6">
                    <div class="stat-mini">
                        <div class="stat-mini-value text-info">25</div>
                        <div class="stat-mini-label">已完成</div>
                    </div>
                </div>
                <div class="col-md-2 col-6">
                    <div class="stat-mini">
                        <div class="stat-mini-value text-danger">3</div>
                        <div class="stat-mini-label">已取消</div>
                    </div>
                </div>
                <div class="col-md-2 col-6">
                    <div class="stat-mini">
                        <div class="stat-mini-value">¥45,890</div>
                        <div class="stat-mini-label">总销售额</div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="data-card mb-4">
                <div class="data-card-header">
                    <h5 class="mb-0 text-white fw-semibold">筛选条件</h5>
                </div>
                <div class="p-4">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <input type="text" class="form-control" id="searchOrder" placeholder="搜索订单号或客户..." oninput="filterOrders()">
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" id="filterStatus" onchange="filterOrders()">
                                <option value="">全部状态</option>
                                <option value="pending">待处理</option>
                                <option value="processing">处理中</option>
                                <option value="shipped">已发货</option>
                                <option value="completed">已完成</option>
                                <option value="cancelled">已取消</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" id="filterWarehouse" onchange="filterOrders()">
                                <option value="">全部仓库</option>
                                <option value="us">🇺🇸 美国仓</option>
                                <option value="uk">🇬🇧 英国仓</option>
                                <option value="de">🇩🇪 德国仓</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <input type="date" class="form-control" id="filterDateStart">
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-secondary w-100" onclick="resetOrderFilters()">
                                <i class="bi bi-arrow-clockwise me-2"></i>重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="data-card">
                <div class="data-card-header">
                    <h5 class="mb-0 text-white fw-semibold">订单列表</h5>
                    <button class="btn btn-sm btn-success" onclick="exportOrders()">
                        <i class="bi bi-download me-1"></i>导出
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-modern mb-0">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="form-check-input" onchange="toggleAllOrders(this)"></th>
                                <th>订单号</th>
                                <th>客户</th>
                                <th>仓库</th>
                                <th>商品数量</th>
                                <th>金额</th>
                                <th>状态</th>
                                <th>下单时间</th>
                                <th>快捷操作</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <!-- Orders will be rendered here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Order Detail Modal - 完整详情弹窗 -->
    <div class="modal fade" id="orderDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white">
                        <i class="bi bi-receipt me-2"></i>订单详情 <span id="modalOrderId" class="text-primary"></span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="orderDetailContent">
                        <!-- Order detail will be rendered here -->
                    </div>
                </div>
                <div class="modal-footer" id="orderModalFooter">
                    <!-- Action buttons will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Order Data - 从localStorage加载
        let orders = JSON.parse(localStorage.getItem('orders') || '[]');

        const statusNames = { pending: '待处理', processing: '处理中', shipped: '已发货', completed: '已完成', cancelled: '已取消' };
        const warehouseNames = { us: '🇺🇸 美国仓', uk: '🇬🇧 英国仓', de: '🇩🇪 德国仓' };
        const warehouseBadges = { us: 'badge-warehouse-us', uk: 'badge-warehouse-uk', de: 'badge-warehouse-de' };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderOrders();
        });

        function renderOrders(data = orders) {
            const tbody = document.getElementById('ordersTableBody');
            document.getElementById('totalOrders').textContent = data.length;
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center text-secondary py-5">暂无订单数据</td></tr>`;
                return;
            }
            
            tbody.innerHTML = data.map(o => `
                <tr style="cursor:pointer" onclick="viewOrder('${o.id}')">
                    <td onclick="event.stopPropagation()"><input type="checkbox" class="form-check-input order-checkbox" data-id="${o.id}"></td>
                    <td><span class="text-primary fw-medium">#${o.id}</span></td>
                    <td>
                        <div>
                            <div class="text-white">${o.customer}</div>
                            <small class="text-secondary">${o.phone}</small>
                        </div>
                    </td>
                    <td><span class="badge ${warehouseBadges[o.warehouse]}">${warehouseNames[o.warehouse]}</span></td>
                    <td>${o.items} 件</td>
                    <td class="text-success fw-semibold">¥${o.amount.toLocaleString()}</td>
                    <td><span class="badge-status ${statusBadges[o.status]}">${statusNames[o.status]}</span></td>
                    <td class="text-secondary">${o.date}</td>
                    <td onclick="event.stopPropagation()">
                        <div class="d-flex gap-1">
                            ${o.status === 'pending' || o.status === 'processing' ? `
                                <button class="btn btn-sm btn-success" onclick="shipOrder('${o.id}')" title="发货">
                                    <i class="bi bi-truck"></i> 发货
                                </button>
                            ` : ''}
                            <button class="btn btn-sm btn-outline-info" onclick="viewOrder('${o.id}')" title="查看详情">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterOrders() {
            const search = document.getElementById('searchOrder').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const warehouse = document.getElementById('filterWarehouse').value;
            
            let filtered = orders.filter(o => {
                const matchSearch = o.id.toLowerCase().includes(search) || o.customer.toLowerCase().includes(search);
                const matchStatus = !status || o.status === status;
                const matchWarehouse = !warehouse || o.warehouse === warehouse;
                return matchSearch && matchStatus && matchWarehouse;
            });
            
            renderOrders(filtered);
        }

        function resetOrderFilters() {
            document.getElementById('searchOrder').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterWarehouse').value = '';
            renderOrders();
        }

        // 查看订单详情 - 完整弹窗
        function viewOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;
            
            document.getElementById('modalOrderId').textContent = `#${order.id}`;
            
            // 渲染订单详情
            document.getElementById('orderDetailContent').innerHTML = `
                <!-- 状态操作提示 -->
                <div class="action-box action-box-${order.status} mb-4">
                    <div class="d-flex align-items-center justify-content-center gap-3">
                        <i class="bi ${getStatusIcon(order.status)} fs-3"></i>
                        <div>
                            <div class="fw-bold">当前状态：<span class="badge-status ${statusBadges[order.status]}">${statusNames[order.status]}</span></div>
                            <small class="text-secondary">${getStatusHint(order.status)}</small>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <!-- 左侧：订单信息 -->
                    <div class="col-md-6">
                        <div class="detail-card">
                            <div class="detail-card-title"><i class="bi bi-info-circle me-2"></i>订单信息</div>
                            <div class="detail-item">
                                <span class="detail-label">订单编号</span>
                                <span class="detail-value text-primary">#${order.id}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">下单时间</span>
                                <span class="detail-value">${order.date}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">所属仓库</span>
                                <span class="detail-value"><span class="badge ${warehouseBadges[order.warehouse]}">${warehouseNames[order.warehouse]}</span></span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">商品数量</span>
                                <span class="detail-value">${order.items} 件</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">订单金额</span>
                                <span class="detail-value text-success fs-5 fw-bold">¥${order.amount.toLocaleString()}</span>
                            </div>
                            ${order.tracking ? `
                            <div class="detail-item">
                                <span class="detail-label">物流单号</span>
                                <span class="detail-value text-warning">${order.tracking}</span>
                            </div>
                            ` : ''}
                            ${order.note ? `
                            <div class="detail-item">
                                <span class="detail-label">订单备注</span>
                                <span class="detail-value text-warning">${order.note}</span>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                    
                    <!-- 右侧：收货信息 -->
                    <div class="col-md-6">
                        <div class="detail-card">
                            <div class="detail-card-title"><i class="bi bi-person me-2"></i>收货信息</div>
                            <div class="detail-item">
                                <span class="detail-label">收货人</span>
                                <span class="detail-value">${order.customer}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">联系电话</span>
                                <span class="detail-value">${order.phone}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">邮编</span>
                                <span class="detail-value">${order.zipCode || '-'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">收货地址</span>
                                <span class="detail-value" style="text-align:right;max-width:200px">${order.address}</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 商品明细 -->
                <div class="detail-card mt-3">
                    <div class="detail-card-title"><i class="bi bi-box-seam me-2"></i>商品明细</div>
                    <table class="table table-sm mb-0">
                        <thead>
                            <tr>
                                <th>商品名称</th>
                                <th>单价</th>
                                <th>数量</th>
                                <th>小计</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${order.products.length > 0 ? order.products.map(p => `
                                <tr>
                                    <td>${p.name}</td>
                                    <td class="text-secondary">¥${p.price}</td>
                                    <td>×${p.qty}</td>
                                    <td class="text-success fw-semibold">¥${p.subtotal.toLocaleString()}</td>
                                </tr>
                            `).join('') : `
                                <tr>
                                    <td colspan="4" class="text-center text-secondary">暂无商品</td>
                                </tr>
                            `}
                            <tr style="background:rgba(99,102,241,0.1)">
                                <td colspan="2" class="text-end"><strong>合计</strong></td>
                                <td><strong>${order.items} 件</strong></td>
                                <td class="text-success fs-5 fw-bold">¥${order.amount.toLocaleString()}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
            
            // 渲染操作按钮
            let footerHTML = `<button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="bi bi-x-lg me-2"></i>关闭</button>`;
            
            if (order.status === 'pending') {
                footerHTML += `
                    <button type="button" class="btn btn-outline-danger" onclick="cancelOrder('${order.id}')">
                        <i class="bi bi-x-circle me-2"></i>取消订单
                    </button>
                    <button type="button" class="btn btn-success btn-lg" onclick="shipOrder('${order.id}')">
                        <i class="bi bi-truck me-2"></i>确认发货
                    </button>
                `;
            } else if (order.status === 'processing') {
                footerHTML += `
                    <button type="button" class="btn btn-success btn-lg" onclick="shipOrder('${order.id}')">
                        <i class="bi bi-truck me-2"></i>确认发货
                    </button>
                `;
            }
            
            // 添加导出按钮
            footerHTML += `
                <button type="button" class="btn btn-outline-primary" onclick="exportSingleOrder('${order.id}')">
                    <i class="bi bi-download me-2"></i>导出此订单
                </button>
            `;
            
            document.getElementById('orderModalFooter').innerHTML = footerHTML;
            
            new bootstrap.Modal(document.getElementById('orderDetailModal')).show();
        }

        function getStatusIcon(status) {
            const icons = {
                pending: 'bi-clock-history',
                processing: 'bi-gear-half',
                shipped: 'bi-truck',
                completed: 'bi-check-circle',
                cancelled: 'bi-x-circle'
            };
            return icons[status] || 'bi-circle';
        }

        function getStatusHint(status) {
            const hints = {
                pending: '订单待处理，请尽快确认发货',
                processing: '订单正在处理中',
                shipped: '商品已发出，等待客户确认收货',
                completed: '订单已完成，交易成功',
                cancelled: '订单已取消'
            };
            return hints[status] || '';
        }

        // 快速发货（不打开详情）
        function quickShip(id) {
            if (confirm('确认快速发货？')) {
                const order = orders.find(o => o.id === id);
                if (order) {
                    order.status = 'shipped';
                    order.tracking = generateTracking();
                    localStorage.setItem('orders', JSON.stringify(orders));
                }
                renderOrders();
                showToast(`订单 ${id} 已发货`);
            }
        }

        // 确认发货
        function shipOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;
            
            // 模拟输入运单号
            const tracking = prompt('请输入物流单号（可留空）：', order.tracking || '');
            
            order.status = 'shipped';
            order.tracking = tracking || generateTracking();
            localStorage.setItem('orders', JSON.stringify(orders));
            
            renderOrders();
            bootstrap.Modal.getInstance(document.getElementById('orderDetailModal')).hide();
            showToast(`订单 ${id} 已发货，运单号：${order.tracking}`);
        }

        // 取消订单
        function cancelOrder(id) {
            if (confirm('确定要取消此订单吗？')) {
                const order = orders.find(o => o.id === id);
                if (order) order.status = 'cancelled';
                localStorage.setItem('orders', JSON.stringify(orders));
                renderOrders();
                bootstrap.Modal.getInstance(document.getElementById('orderDetailModal')).hide();
                showToast('订单已取消');
            }
        }

        // 确认完成
        function completeOrder(id) {
            if (confirm('确认客户已收货，标记订单完成？')) {
                const order = orders.find(o => o.id === id);
                if (order) order.status = 'completed';
                localStorage.setItem('orders', JSON.stringify(orders));
                renderOrders();
                bootstrap.Modal.getInstance(document.getElementById('orderDetailModal')).hide();
                showToast('订单已完成');
            }
        }

        function generateTracking() {
            const prefix = ['SF', 'YT', 'YD', 'ZTO', 'EMS'][Math.floor(Math.random() * 5)];
            return prefix + Math.random().toString().slice(2, 12);
        }

        function toggleAllOrders(checkbox) {
            document.querySelectorAll('.order-checkbox').forEach(cb => cb.checked = checkbox.checked);
        }

        function batchShip() {
            const selected = document.querySelectorAll('.order-checkbox:checked');
            if (selected.length === 0) {
                alert('请先选择要发货的订单');
                return;
            }
            if (confirm(`确定要发货选中的 ${selected.length} 个订单吗？`)) {
                selected.forEach(cb => {
                    const order = orders.find(o => o.id === cb.dataset.id);
                    if (order && order.status === 'pending') {
                        order.status = 'shipped';
                        order.tracking = generateTracking();
                    }
                });
                renderOrders();
                showToast(`已发货 ${selected.length} 个订单`);
            }
        }

        // 导出单个订单
        function exportSingleOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;
            
            const content = generateOrderCSV([order]);
            downloadCSV(content, `订单_${order.id}.csv`);
            showToast(`订单 ${order.id} 已导出`);
        }
        
        // 批量导出订单
        function exportOrders() {
            const selected = document.querySelectorAll('.order-checkbox:checked');
            let ordersToExport;
            
            if (selected.length > 0) {
                ordersToExport = Array.from(selected).map(cb => orders.find(o => o.id === cb.dataset.id)).filter(Boolean);
                if (ordersToExport.length === 0) {
                    // 如果选中的没找到，就导出全部
                    ordersToExport = orders;
                }
            } else {
                ordersToExport = orders;
            }
            
            const content = generateOrderCSV(ordersToExport);
            downloadCSV(content, `订单批量导出_${new Date().toISOString().slice(0,10)}.csv`);
            showToast(`已导出 ${ordersToExport.length} 个订单`);
        }
        
        // 生成CSV内容
        function generateOrderCSV(orderList) {
            const headers = ['订单编号', '客户姓名', '联系电话', '邮编', '收货地址', '仓库', '商品明细', '订单金额', '物流单号', '下单时间', '订单状态', '备注'];
            const rows = orderList.map(o => [
                o.id,
                o.customer,
                o.phone,
                o.zipCode || '',
                o.address,
                warehouseNames[o.warehouse] || o.warehouse,
                o.products.map(p => `${p.name} x${p.qty}`).join('; '),
                `¥${o.amount}`,
                o.tracking || '',
                o.date,
                statusNames[o.status] || o.status,
                o.note || ''
            ]);
            
            const csvContent = [headers, ...rows].map(row => 
                row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
            ).join('\n');
            
            return '\ufeff' + csvContent; // BOM for Excel UTF-8
        }
        
        // 下载CSV文件
        function downloadCSV(content, filename) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'position-fixed bottom-0 end-0 p-3';
            toast.style.zIndex = '9999';
            toast.innerHTML = `<div class="toast show" role="alert" aria-live="polite" style="background:var(--bg-card);border:1px solid var(--border-color)"><div class="toast-body text-white"><i class="bi bi-check-circle text-success me-2"></i>${message}</div></div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Initial render
        renderOrders();
    </script>
</body>
</html>
