<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外仓掌柜 - 商品采购平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        dark: '#0f0f23',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        body { background: #f8f9fa; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-8">
                    <h1 class="text-xl font-bold text-gray-800">
                        <span class="text-primary">海外仓</span>掌柜
                    </h1>
                    <nav class="hidden md:flex items-center gap-6">
                        <a href="products.html" class="text-gray-600 hover:text-primary font-medium">商品列表</a>
                        <a href="cart.html" class="text-gray-600 hover:text-primary font-medium">采购单</a>
                        <a href="orders.html" class="text-gray-600 hover:text-primary font-medium">订单查询</a>
                    </nav>
                </div>
                <div class="flex items-center gap-4">
                    <button class="relative p-2 text-gray-600 hover:text-primary" onclick="location.href='cart.html'">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <span id="cartBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
                    </button>
                    <span class="text-gray-500 text-sm">欢迎，采购商</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="bg-gradient-to-r from-primary to-secondary text-white py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h2 class="text-3xl font-bold mb-3">海外仓商品采购平台</h2>
            <p class="text-white/80 mb-6">精选美国仓优质商品，一件代发，全球配送</p>
            <div class="flex justify-center gap-4">
                <button onclick="location.href='products.html'" class="bg-white text-primary px-6 py-2 rounded-lg font-medium hover:bg-gray-100 transition">
                    浏览商品
                </button>
                <button class="border border-white/30 px-6 py-2 rounded-lg font-medium hover:bg-white/10 transition">
                    查看报价
                </button>
            </div>
        </div>
    </section>

    <!-- Warehouse Stats -->
    <section class="py-8 bg-white">
        <div class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="flex items-center gap-4 p-6 rounded-xl border border-gray-200">
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-2xl">🇺🇸</span>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-800">美国仓</h3>
                        <p class="text-gray-500 text-sm">已开放 | <span id="usProductCount">0</span> 个商品</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 p-6 rounded-xl border border-gray-200 opacity-50">
                    <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center">
                        <span class="text-2xl">🇬🇧</span>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-800">英国仓</h3>
                        <p class="text-gray-500 text-sm">即将开放 | <span class="uk-count">-</span> 个商品</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 p-6 rounded-xl border border-gray-200 opacity-50">
                    <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center">
                        <span class="text-2xl">🇩🇪</span>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-800">德国仓</h3>
                        <p class="text-gray-500 text-sm">即将开放</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Featured Products -->
    <section class="py-12">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-bold text-gray-800">🔥 热门商品</h2>
                <a href="products.html" class="text-primary font-medium hover:underline">查看全部 →</a>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="featuredProducts">
                <!-- Products loaded by JS -->
                <div class="text-center text-gray-400 py-12 col-span-4">
                    加载中...
                </div>
            </div>
        </div>
    </section>

    <!-- Quick Stats -->
    <section class="py-12 bg-gray-800 text-white">
        <div class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                <div>
                    <div class="text-3xl font-bold text-accent" id="statProducts">0</div>
                    <div class="text-gray-400 mt-1">精选商品</div>
                </div>
                <div>
                    <div class="text-3xl font-bold text-accent">1</div>
                    <div class="text-gray-400 mt-1">运营仓库</div>
                </div>
                <div>
                    <div class="text-3xl font-bold text-accent">24h</div>
                    <div class="text-gray-400 mt-1">急速发货</div>
                </div>
                <div>
                    <div class="text-3xl font-bold text-accent">7×24</div>
                    <div class="text-gray-400 mt-1">专属客服</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white border-t py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500">
            <p>© 2024 海外仓掌柜. 专业跨境电商货源平台</p>
            <p class="mt-2 text-sm">目前仅开放美国仓，英国仓和德国仓即将上线</p>
        </div>
    </footer>

<script src="products-data-real.js"></script>
    <script>
        let products = window.products || [];
        
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('overseasCart') || '[]');
            const total = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartBadge').textContent = total;
        }
        
        function renderFeaturedProducts() {
            const grid = document.getElementById('featuredProducts');
            
            // 从 window.products 初始化（products-data-real.js 注入）
            if (typeof window.products !== 'undefined' && window.products.length > 0) {
                products = window.products;
            }
            
            const featured = products.slice(0, 8);
            
            if (featured.length === 0) {
                grid.innerHTML = '<div class="text-center text-gray-400 py-12 col-span-4">暂无商品数据，请前往商品列表页面</div>';
                return;
            }
            
            grid.innerHTML = featured.map(p => `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden card-hover transition-all duration-300 cursor-pointer" 
                     onclick="location.href='product-detail.html?id=${p.id}'">
                    <div class="aspect-square bg-gray-100 overflow-hidden flex items-center justify-center">
                        ${p.image ? `<img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\\'text-6xl\\'>📦<\\/div>'">` : `<div class="text-6xl">📦</div>`}
                    </div>
                    <div class="p-4">
                        <div class="text-xs text-gray-400 mb-1">${p.sku}</div>
                        <h3 class="font-medium text-gray-800 mb-2 line-clamp-2">${p.name}</h3>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-xs px-2 py-0.5 bg-red-100 text-red-600 rounded">${p.warehouse}</span>
                            <span class="text-xs ${p.stock > 0 ? 'text-green-600' : 'text-gray-400'}">
                                ${p.stock > 0 ? '有货' : '缺货'}
                            </span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-lg font-bold text-primary">${p.currency}${p.price || 0}</span>
                            <span class="text-sm text-gray-400">建议${p.retailCurrency}${p.retailPrice || 0}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // 更新统计
            document.getElementById('statProducts').textContent = products.length;
            document.getElementById('usProductCount').textContent = products.length;
        }
        
        function init() {
            updateCartBadge();
            // 等待DOM加载完成后渲染
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', renderFeaturedProducts);
            } else {
                renderFeaturedProducts();
            }
        }
        
        init();
    </script>
</body>
</html>
