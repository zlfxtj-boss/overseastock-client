<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 海外仓掌柜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        dark: '#0f0f23',
                        darker: '#080814',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        .glass { background: rgba(30,27,75,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { background: linear-gradient(135deg, #6366f1, #8b5cf6); }

        /* Accessibility */
        .skip-link { position: absolute; top: -40px; left: 0; background: var(--primary); color: white; padding: 8px 16px; z-index: 1000; transition: top 0.3s; }
        .skip-link:focus { top: 0; }
        .btn:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    </style>
</head>
<body class="bg-darker min-h-screen">
    <!-- Header -->
    <header class="glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3" onclick="location.href='products.html'" style="cursor:pointer">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-accent rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-white font-semibold">海外仓掌柜</h1>
                        <p class="text-gray-500 text-xs">客户端采购平台</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="location.href='products.html'" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                        </svg>
                        新建采购单
                    </button>
                    <div class="flex items-center gap-2 pl-4 border-l border-white/10">
                        <div class="w-8 h-8 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-white text-sm font-medium">S</div>
                        <span class="text-white text-sm">用户</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" role="main" class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-white">我的订单</h1>
            <div class="flex gap-2">
                <button onclick="filterOrders('all')" class="tab-btn tab-active px-4 py-2 rounded-xl text-white text-sm font-medium transition-all">全部订单</button>
                <button onclick="filterOrders('pending')" class="tab-btn px-4 py-2 rounded-xl text-gray-400 text-sm font-medium hover:bg-white/5 transition-all">待发货</button>
                <button onclick="filterOrders('shipped')" class="tab-btn px-4 py-2 rounded-xl text-gray-400 text-sm font-medium hover:bg-white/5 transition-all">已发货</button>
                <button onclick="filterOrders('completed')" class="tab-btn px-4 py-2 rounded-xl text-gray-400 text-sm font-medium hover:bg-white/5 transition-all">已完成</button>
            </div>
        </div>

<!-- Orders List -->
        <div class="space-y-4" id="ordersList">
            <!-- 暂无订单 -->
            <div class="glass rounded-2xl p-12 text-center">
                <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </div>
                <h3 class="text-white text-lg font-medium mb-2">暂无订单</h3>
                <p class="text-gray-500 text-sm mb-6">您还没有任何订单记录</p>
                <a href="products.html" class="inline-flex items-center gap-2 bg-primary hover:bg-primary/80 text-white px-6 py-3 rounded-xl font-medium transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                    去采购
                </a>
            </div>
        </div>
    </main>

    <script>
        function filterOrders(status) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('text-gray-400');
            });
            event.target.classList.add('tab-active');
            event.target.classList.remove('text-gray-400');
            // In real app, filter orders by status
        }

        function cancelOrder(orderId) {
            if (confirm('确定要取消订单 ' + orderId + ' 吗？')) {
                alert('订单已取消');
                location.reload();
            }
        }
    </script>
</body>
</html>
