<!DOCTYPE html>
<html lang="zh-CN"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 海外仓掌柜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        dark: '#0f0f23',
                        darker: '#080814',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        .glass { background: rgba(30,27,75,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-darker min-h-screen">
    <!-- Header -->
    <header class="glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3" onclick="location.href='products.html'" style="cursor:pointer">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-accent rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-white font-semibold">海外仓掌柜</h1>
                        <p class="text-gray-500 text-xs">客户端采购平台</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="location.href='cart.html'" class="text-gray-400 hover:text-white transition-colors relative">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <span id="cartBadge" class="absolute -top-1 -right-1 w-4 h-4 bg-primary rounded-full text-xs text-white flex items-center justify-center">0</span>
                    </button>
                    <div class="flex items-center gap-2 pl-4 border-l border-white/10">
                        <div class="w-8 h-8 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-white text-sm font-medium">S</div>
                        <span class="text-white text-sm">用户</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Breadcrumb -->
        <nav class="flex items-center gap-2 text-sm mb-6">
            <a href="products.html" class="text-gray-400 hover:text-white transition-colors">商品列表</a>
            <span class="text-gray-600">/</span>
            <span class="text-white" id="productName">兰蔻小黑瓶精华液</span>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Product Image -->
            <div class="glass rounded-3xl p-8">
                <div class="aspect-square bg-gradient-to-br from-white/5 to-white/10 rounded-2xl overflow-hidden flex items-center justify-center" id="productImageContainer">
                    <img id="productImage" src="" alt="商品图片" class="w-full h-full object-contain">
                </div>
                <!-- Thumbnails -->
                <div class="flex gap-3 mt-4" id="thumbnailsRow">
                    <div class="w-20 h-20 bg-primary/20 rounded-xl overflow-hidden flex items-center justify-center cursor-pointer border-2 border-primary" id="thumb1" onclick="selectThumb(this)"><img id="thumb1Img" src="" class="w-full h-full object-cover"></div>
                    <div class="w-20 h-20 bg-white/5 rounded-xl overflow-hidden flex items-center justify-center cursor-pointer hover:bg-white/10 transition-colors" id="thumb2" onclick="selectThumb(this)"><img id="thumb2Img" src="" class="w-full h-full object-cover"></div>
                    <div class="w-20 h-20 bg-white/5 rounded-xl overflow-hidden flex items-center justify-center cursor-pointer hover:bg-white/10 transition-colors" id="thumb3" onclick="selectThumb(this)"><img id="thumb3Img" src="" class="w-full h-full object-cover"></div>
                    <div class="w-20 h-20 bg-white/5 rounded-xl overflow-hidden flex items-center justify-center cursor-pointer hover:bg-white/10 transition-colors" id="thumb4" onclick="selectThumb(this)"><img id="thumb4Img" src="" class="w-full h-full object-cover"></div>
                </div>
            </div>

            <!-- Product Info -->
            <div class="space-y-6">
                <!-- Title -->
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="px-3 py-1 bg-blue-500/20 text-blue-400 rounded-full text-xs font-medium" id="warehouseBadge">🇺🇸 美国仓</span>
                        <span class="text-gray-500 text-sm" id="skuLabel">SKU: LANCOME-001</span>
                    </div>
                    <h1 class="text-2xl font-bold text-white mb-2" id="productTitle">兰蔻小黑瓶精华液 50ml</h1>
                    <p class="text-gray-400" id="productSubtitle">Lancôme Génifique Youth Activating Concentrate 50ml</p>
                </div>

                <!-- Price Card - 当地货币，不显示利润 -->
                <div class="glass rounded-2xl p-6">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="text-center">
                            <p class="text-gray-500 text-sm mb-1">采购价</p>
                            <p class="text-2xl font-bold text-accent" id="purchasePrice">$26.00</p>
                        </div>
                        <div class="text-center">
                            <p class="text-gray-500 text-sm mb-1">建议零售价</p>
                            <p class="text-2xl font-bold text-white" id="retailPrice">¥268</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 text-sm">
                        <span class="px-3 py-1 bg-green-500/20 text-green-400 rounded-lg" id="stockBadge">
                            <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                            库存充足
                        </span>
                        <span class="text-gray-400">当前库存: <span class="text-white font-semibold" id="stockCount">156</span> <span id="stockUnit">件</span></span>
                    </div>
                </div>

                <!-- Specifications -->
                <div class="glass rounded-2xl p-6">
                    <h3 class="text-white font-semibold mb-4">商品规格</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm" id="specs">
                        <div class="flex justify-between py-2 border-b border-white/5">
                            <span class="text-gray-500">品牌</span>
                            <span class="text-white">Lancôme</span>
                        </div>
                        <div class="flex justify-between py-2 border-b border-white/5">
                            <span class="text-gray-500">产地</span>
                            <span class="text-white">法国</span>
                        </div>
                        <div class="flex justify-between py-2 border-b border-white/5">
                            <span class="text-gray-500">规格</span>
                            <span class="text-white" id="specSize">50ml</span>
                        </div>
                        <div class="flex justify-between py-2 border-b border-white/5">
                            <span class="text-gray-500">保质期</span>
                            <span class="text-white">2026年后</span>
                        </div>
                    </div>
                </div>

                <!-- Quantity -->
                <div class="glass rounded-2xl p-6">
                    <h3 class="text-white font-semibold mb-4">采购数量</h3>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center bg-white/5 rounded-xl">
                            <button onclick="decreaseQty()" class="w-12 h-12 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                                </svg>
                            </button>
                            <input type="number" id="quantity" value="1" min="1" class="w-20 bg-transparent text-center text-white text-xl font-semibold focus:outline-none">
                            <button onclick="increaseQty()" class="w-12 h-12 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                                </svg>
                            </button>
                        </div>
                        <span class="text-gray-500 text-sm">起订量: <span id="minOrder">1</span>件</span>
                    </div>
                    <div class="mt-4 flex items-center justify-between text-sm">
                        <span class="text-gray-500">小计</span>
                        <span class="text-xl font-bold text-accent" id="subtotal">$26.00</span>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex gap-4">
                    <button onclick="addToCart()" class="flex-1 bg-primary hover:bg-primary/80 text-white py-4 rounded-xl font-semibold transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        加入采购单
                    </button>
                    <button onclick="buyNow()" class="flex-1 bg-gradient-to-r from-accent to-green-500 hover:opacity-90 text-white py-4 rounded-xl font-semibold transition-all flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        立即下单
                    </button>
                </div>
            </div>
        </div>

        <!-- Product Description -->
        <div class="mt-8 glass rounded-2xl p-6">
            <h3 class="text-white font-semibold mb-4">商品描述</h3>
        <div class="text-gray-400 space-y-3 text-sm leading-relaxed" id="description"></div>
    </div>
</section>

<script src="products-data-real.js"></script>
    <script>
        const warehouseFlags = { us: '🇺🇸' };

        // 直接使用 products-data-real.js 注入的全局数据
        let products = window.products || [];
        let currentProduct = null;
        let unitPrice = 0;
        let currencySymbol = '$';
        let retailCurrencySymbol = '$';

        // 缩略图点击切换主图
        function selectThumb(el) {
            const img = el.querySelector('img');
            if (img && img.src) {
                document.getElementById('productImage').src = img.src;
                document.getElementById('productImage').style.display = 'block';
                document.getElementById('productImageContainer').innerHTML = '<img id="productImage" src="' + img.src + '" alt="商品图片" class="w-full h-full object-contain">';
            }
        }

        function loadProduct() {
            // 获取URL参数（保持字符串类型，与数据一致）
            const params = new URLSearchParams(window.location.search);
            return params.get('id') || '';
        }

        // 初始化页面
        function initPage() {
            const productId = getProductId();
            currentProduct = products.find(p => p.id == productId);

            if (!currentProduct) {
                document.getElementById('productName').textContent = '商品不存在';
                return;
            }
            
            unitPrice = currentProduct.price;
            currencySymbol = currentProduct.currency;
            retailCurrencySymbol = currentProduct.retailCurrency || '$';
            
            // 更新页面元素
            document.getElementById('productName').textContent = currentProduct.name;
            document.getElementById('productTitle').textContent = currentProduct.name;
            document.getElementById('productSubtitle').textContent = currentProduct.sku;
            document.getElementById('warehouseBadge').textContent = currentProduct.warehouse;
            document.getElementById('skuLabel').textContent = 'SKU: ' + currentProduct.sku;
            const img = currentProduct.image;
            const imgSrc = img && img.startsWith('http') ? img : '';
            document.getElementById('productImage').src = imgSrc;
            document.getElementById('productImage').onerror = function() {
                this.style.display='none';
                document.getElementById('productImageContainer').innerHTML='<div class="text-9xl">📦</div>';
            };
            // 4个缩略图都用同一张图（实际只有1张图）
            ['thumb1','thumb2','thumb3','thumb4'].forEach((id,i) => {
                const el = document.getElementById(id + 'Img');
                if (el) el.src = imgSrc;
            });
            
            // 价格 - 采购价和建议零售价都显示当地货币
            document.getElementById('purchasePrice').textContent = currencySymbol + unitPrice.toFixed(2);
            document.getElementById('retailPrice').textContent = retailCurrencySymbol + currentProduct.retailPrice.toFixed(2);
            
            // 库存
            const stock = currentProduct.stock || 0;
            document.getElementById('stockCount').textContent = stock;
            document.getElementById('stockUnit').textContent = currentProduct.unit || '件';
            if (stock > 50) {
                document.getElementById('stockBadge').innerHTML = '<svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>库存充足';
                document.getElementById('stockBadge').className = 'px-3 py-1 bg-green-500/20 text-green-400 rounded-lg';
            } else if (stock > 10) {
                document.getElementById('stockBadge').innerHTML = '<svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>库存紧张';
                document.getElementById('stockBadge').className = 'px-3 py-1 bg-orange-500/20 text-orange-400 rounded-lg';
            } else {
                document.getElementById('stockBadge').innerHTML = '<svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>库存不足';
                document.getElementById('stockBadge').className = 'px-3 py-1 bg-red-500/20 text-red-400 rounded-lg';
            }
            
            // 规格
            const specs = currentProduct.specs || {};
            document.getElementById('specSize').textContent = specs["尺寸"] || '-';
            document.getElementById('specs').innerHTML = `
                <div class="flex justify-between py-2 border-b border-white/5">
                    <span class="text-gray-500">商品尺寸</span>
                    <span class="text-white">${specs["尺寸"] || '-'}</span>
                </div>
                <div class="flex justify-between py-2 border-b border-white/5">
                    <span class="text-gray-500">重量</span>
                    <span class="text-white">${specs["重量"] || '-'}</span>
                </div>
                <div class="flex justify-between py-2 border-b border-white/5">
                    <span class="text-gray-500">出口申报单价</span>
                    <span class="text-white">$${specs["出口申报"] || '-'}</span>
                </div>
                <div class="flex justify-between py-2 border-b border-white/5">
                    <span class="text-gray-500">进口申报单价</span>
                    <span class="text-white">$${specs["进口申报"] || '-'}</span>
                </div>
                <div class="flex justify-between py-2 border-b border-white/5">
                    <span class="text-gray-500">含木制品重量</span>
                    <span class="text-white">${specs["含木制品"] || '-'}</span>
                </div>
                ${currentProduct.link ? `<div class="flex justify-between py-2 border-b border-white/5">
                    <span class="text-gray-500">采购链接</span>
                    <a href="${currentProduct.link}" target="_blank" class="text-primary hover:text-blue-400">查看1688</a>
                </div>` : ''}
            `;
            
            // 描述
            document.getElementById('description').innerHTML = `
                <p>${currentProduct.description || ''}</p>
            `;
            
            updateSubtotal();
            updateCartBadge();
        }

        function updateSubtotal() {
            document.getElementById('subtotal').textContent = currencySymbol + (quantity * unitPrice).toFixed(2);
        }

        function decreaseQty() {
            if (quantity > 1) {
                quantity -= 1;
                document.getElementById('quantity').value = quantity;
                updateSubtotal();
            }
        }

        function increaseQty() {
            quantity += 1;
            document.getElementById('quantity').value = quantity;
            updateSubtotal();
        }

        document.getElementById('quantity').addEventListener('change', function(e) {
            let val = parseInt(e.target.value);
            if (val < 1) val = 1;
            quantity = val;
            updateSubtotal();
        });

        // 获取购物车
        function getCart() {
            const cart = localStorage.getItem('overseasCart');
            return cart ? JSON.parse(cart) : [];
        }

        // 保存购物车
        function saveCart(cart) {
            localStorage.setItem('overseasCart', JSON.stringify(cart));
        }

        // 添加到购物车
        function addToCart() {
            const cart = getCart();
            const existingItem = cart.find(item => item.id === currentProduct.id);
            
            if (existingItem) {
                existingItem.qty += quantity;
            } else {
                cart.push({
                    id: currentProduct.id,
                    name: currentProduct.name,
                    sku: currentProduct.sku,
                    warehouse: currentProduct.warehouse,
                    price: currentProduct.price,
                    currency: currentProduct.currency,
                    currencyName: currentProduct.currencyName,
                    retailPriceCNY: currentProduct.retailPriceCNY,
                    unit: currentProduct.unit,
                    image: currentProduct.image,
                    qty: quantity
                });
            }
            
            saveCart(cart);
            updateCartBadge();
            
            // 显示提示
            const toast = document.createElement('div');
            toast.className = 'fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-green-500/90 text-white px-6 py-4 rounded-xl shadow-2xl z-50 flex items-center gap-3';
            toast.innerHTML = '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>已加入采购单！';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // 立即购买
        function buyNow() {
            const cart = getCart();
            const existingItem = cart.find(item => item.id === currentProduct.id);
            
            if (existingItem) {
                existingItem.qty += quantity;
            } else {
                cart.push({
                    id: currentProduct.id,
                    name: currentProduct.name,
                    sku: currentProduct.sku,
                    warehouse: currentProduct.warehouse,
                    price: currentProduct.price,
                    currency: currentProduct.currency,
                    currencyName: currentProduct.currencyName,
                    retailPriceCNY: currentProduct.retailPriceCNY,
                    unit: currentProduct.unit,
                    image: currentProduct.image,
                    qty: quantity
                });
            }
            
            saveCart(cart);
            window.location.href = 'cart.html';
        }

        // 更新购物车角标
        function updateCartBadge() {
            const cart = getCart();
            const total = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartBadge').textContent = total;
        }

        initPage();
    </script>
</body>
</html>
