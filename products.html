<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品列表 - 海外仓掌柜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        dark: '#0f0f23',
                        darker: '#080814',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        .glass { background: rgba(30,27,75,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(99,102,241,0.2); }
        .badge { background: linear-gradient(135deg, #6366f1, #8b5cf6); }

        /* Accessibility */
        .skip-link { position: absolute; top: -40px; left: 0; background: var(--primary); color: white; padding: 8px 16px; z-index: 1000; transition: top 0.3s; }
        .skip-link:focus { top: 0; }
        .btn:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    </style>
</head>
<body class="bg-darker min-h-screen">
    <!-- Header -->
    <header class="glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-accent rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-white font-semibold">海外仓掌柜</h1>
                        <p class="text-gray-500 text-xs">客户端采购平台</p>
                    </div>
                </div>

                <!-- Search -->
                <div class="flex-1 max-w-xl mx-8">
                    <div class="relative">
                        <input type="text" id="searchInput" placeholder="搜索商品名称、SKU..." 
                            class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pl-11 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-primary/50 transition-all">
                        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                </div>

                <!-- User & Cart -->
                <div class="flex items-center gap-4">
                    <button onclick="location.href='orders.html'" class="text-gray-400 hover:text-white transition-colors relative">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <span id="orderBadge" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-xs text-white flex items-center justify-center hidden">0</span>
                    </button>
                    <button onclick="location.href='cart.html'" class="text-gray-400 hover:text-white transition-colors relative">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <span id="cartBadge" class="absolute -top-1 -right-1 w-4 h-4 bg-primary rounded-full text-xs text-white flex items-center justify-center">0</span>
                    </button>
                    <div class="flex items-center gap-2 pl-4 border-l border-white/10">
                        <div class="w-8 h-8 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-white text-sm font-medium">S</div>
                        <span class="text-white text-sm">用户</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" role="main" class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex gap-8">
                    <!-- Sidebar -->
            <aside class="w-64 flex-shrink-0">
                <div class="glass rounded-2xl p-6 sticky top-28">
                    <h3 class="text-white font-semibold mb-4">仓库选择</h3>
                    <nav class="space-y-2" id="warehouseNav">
                        <button onclick="filterByWarehouse('all')" class="warehouse-btn active w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all bg-primary/20 text-white">
                            <span class="w-3 h-3 bg-gradient-to-br from-primary to-accent rounded-full"></span>
                            <span>全部仓库</span>
                            <span class="ml-auto text-gray-400 text-sm">(68)</span>
                        </button>
                        <!-- 美国仓 -->
                        <button onclick="filterByWarehouse('us')" class="warehouse-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all text-gray-400 hover:bg-white/5 hover:text-white">
                            <span class="w-3 h-3 bg-blue-500 rounded-full"></span>
                            <span>🇺🇸 美国仓</span>
                            <span class="ml-auto text-gray-500 text-sm" id="usCount">(0)</span>
                        </button>
                        <!-- 英国仓 - 暂不可用 -->
                        <button disabled class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-600 cursor-not-allowed">
                            <span class="w-3 h-3 bg-gray-500 rounded-full"></span>
                            <span>🇬🇧 英国仓</span>
                            <span class="ml-auto text-gray-600 text-sm">待开放</span>
                        </button>
                        <!-- 德国仓 - 暂不可用 -->
                        <button disabled class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-gray-600 cursor-not-allowed">
                            <span class="w-3 h-3 bg-gray-500 rounded-full"></span>
                            <span>🇩🇪 德国仓</span>
                            <span class="ml-auto text-gray-600 text-sm">待开放</span>
                        </button>
                    </nav>

                    <!-- Stock Filter -->
                    <div class="mt-8">
                        <h3 class="text-white font-semibold mb-4">库存状态</h3>
                        <div class="space-y-3">
                            <label class="flex items-center gap-3 text-gray-400 cursor-pointer hover:text-white transition-colors">
                                <input type="checkbox" checked class="w-4 h-4 rounded border-gray-600 bg-white/5 text-primary focus:ring-primary">
                                <span>有库存</span>
                            </label>
                            <label class="flex items-center gap-3 text-gray-400 cursor-pointer hover:text-white transition-colors">
                                <input type="checkbox" class="w-4 h-4 rounded border-gray-600 bg-white/5 text-primary focus:ring-primary">
                                <span>库存紧张</span>
                            </label>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Product Grid -->
            <div class="flex-1">
                <!-- Sort & Results -->
                <div class="flex items-center justify-between mb-6">
                    <p class="text-gray-400">共 <span class="text-white font-semibold" id="totalCount">0</span> 个商品</p>
                    <select class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-white text-sm focus:outline-none focus:border-primary/50">
                        <option>综合排序</option>
                        <option>价格从低到高</option>
                        <option>价格从高到低</option>
                        <option>库存从高到低</option>
                    </select>
                </div>

                <!-- Products Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="productsGrid">
                    <!-- Product cards will be rendered here by JS -->
                </div>

                <!-- Pagination -->
                <div class="flex justify-center mt-10 gap-2">
                    <button class="w-10 h-10 rounded-xl bg-white/5 text-gray-400 hover:bg-primary/20 hover:text-white transition-all flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <button class="w-10 h-10 rounded-xl bg-primary text-white">1</button>
                    <button class="w-10 h-10 rounded-xl bg-white/5 text-gray-400 hover:bg-primary/20 hover:text-white transition-all">2</button>
                    <button class="w-10 h-10 rounded-xl bg-white/5 text-gray-400 hover:bg-primary/20 hover:text-white transition-all">3</button>
                    <button class="w-10 h-10 rounded-xl bg-white/5 text-gray-400 hover:bg-primary/20 hover:text-white transition-all flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="products-data-real.js"></script>
    <script>
// 商品数据：优先从静态文件加载（真实商品数据）
let products = window.products || [];
        const warehouseNames = { us: '🇺🇸 美国仓', uk: '🇬🇧 英国仓', de: '🇩🇪 德国仓', '美国仓': '🇺🇸 美国仓', '英国仓': '🇬🇧 英国仓', '德国仓': '🇩🇪 德国仓' };
        // 兼容仓库字段格式：'us' 或 '美国仓'
        function normalizeWarehouse(w) { return w === 'us' || w === '美国仓' ? 'us' : w === 'uk' || w === '英国仓' ? 'uk' : w === 'de' || w === '德国仓' ? 'de' : w; }
        let currentWarehouse = 'all';

        function renderProducts(warehouse = 'all') {
            const grid = document.getElementById('productsGrid');
            const filtered = warehouse === 'all' ? products : products.filter(p => normalizeWarehouse(p.warehouse) === warehouse);
            
            // 更新美国仓数量
            const usCount = products.filter(p => normalizeWarehouse(p.warehouse) === 'us').length;
            document.getElementById('usCount').textContent = `(${usCount})`;
            // 更新总数量
            document.getElementById('totalCount').textContent = products.length;
            
            grid.innerHTML = filtered.map(p => `
                <div class="glass rounded-2xl overflow-hidden card-hover transition-all duration-300 cursor-pointer" onclick="location.href='product-detail.html?id=${p.id}'">
                    <div class="aspect-square bg-gradient-to-br from-white/5 to-white/10 overflow-hidden">
                        ${p.image ? `<img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\\'w-full h-full flex items-center justify-center text-6xl\\'>📦<\/div>'">` : `<div class="w-full h-full flex items-center justify-center text-6xl">📦</div>`}
                    </div>
                    <div class="p-5">
                        <div class="flex items-start justify-between mb-2">
                            <span class="text-xs text-gray-500">${p.sku}</span>
                            <span class="px-2 py-0.5 rounded-full text-xs ${p.stock > 50 ? 'bg-green-500/20 text-green-400' : 'bg-orange-500/20 text-orange-400'}">
                                ${p.stock > 50 ? '充足' : '紧张'}
                            </span>
                        </div>
                        <h3 class="text-white font-medium mb-2 line-clamp-2">${p.name}</h3>
                        <div class="text-xs text-gray-500 mb-2">${warehouseNames[p.warehouse]}</div>
                        <div class="space-y-1 mb-4">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">采购价</span>
                                <span class="text-accent font-semibold">${p.currency}${p.price}</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">建议零售价</span>
                                <span class="text-gray-300">${p.retailCurrency}${p.retailPrice}</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">库存</span>
                                <span class="text-white">${p.stock} ${p.unit}</span>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); addToCart(${p.id})" class="w-full bg-primary hover:bg-primary/80 text-white py-2.5 rounded-xl font-medium transition-colors flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                            </svg>
                            加入采购单
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterByWarehouse(warehouse) {
            currentWarehouse = warehouse;
            document.querySelectorAll('.warehouse-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-primary/20', 'text-white');
                btn.classList.add('text-gray-400');
            });
            event.target.closest('.warehouse-btn').classList.add('active', 'bg-primary/20', 'text-white');
            event.target.closest('.warehouse-btn').classList.remove('text-gray-400');
            renderProducts(warehouse);
        }
        
        // 规范化商品数据的仓库字段，加载后统一格式
        function normalizeProducts() {
            products.forEach(p => {
                p.warehouse = normalizeWarehouse(p.warehouse);
            });
        }

        function getCart() {
            const cart = localStorage.getItem('overseasCart');
            return cart ? JSON.parse(cart) : [];
        }

        function saveCart(cart) {
            localStorage.setItem('overseasCart', JSON.stringify(cart));
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const cart = getCart();
            const existingItem = cart.find(item => item.id === id);
            
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    sku: product.sku,
                    warehouse: product.warehouse,
                    price: product.price,
                    retailPrice: product.retailPrice,
                    currency: product.currency,
                    currencyName: product.currencyName,
                    unit: product.unit,
                    image: product.image,
                    qty: 1
                });
            }
            
            saveCart(cart);
            updateCartBadge();
            
            // 显示提示
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 bg-green-500/90 text-white px-6 py-3 rounded-xl shadow-2xl z-50 flex items-center gap-3';
            toast.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>已加入采购单！';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function updateCartBadge() {
            const cart = getCart();
            const total = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartBadge').textContent = total;
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            let filtered = products.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.sku.toLowerCase().includes(query)
            );
            if (currentWarehouse !== 'all') {
                filtered = filtered.filter(p => p.warehouse === currentWarehouse);
            }
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = filtered.map(p => `
                <div class="glass rounded-2xl overflow-hidden card-hover transition-all duration-300 cursor-pointer" onclick="location.href='product-detail.html?id=${p.id}'">
                    <div class="aspect-square bg-gradient-to-br from-white/5 to-white/10 overflow-hidden">
                        ${p.image ? `<img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\\'w-full h-full flex items-center justify-center text-6xl\\'>📦<\/div>'">` : `<div class="w-full h-full flex items-center justify-center text-6xl">📦</div>`}
                    </div>
                    <div class="p-5">
                        <div class="flex items-start justify-between mb-2">
                            <span class="text-xs text-gray-500">${p.sku}</span>
                            <span class="px-2 py-0.5 rounded-full text-xs ${p.stock > 50 ? 'bg-green-500/20 text-green-400' : 'bg-orange-500/20 text-orange-400'}">
                                ${p.stock > 50 ? '充足' : '紧张'}
                            </span>
                        </div>
                        <h3 class="text-white font-medium mb-2 line-clamp-2">${p.name}</h3>
                        <div class="text-xs text-gray-500 mb-2">${warehouseNames[p.warehouse]}</div>
                        <div class="space-y-1 mb-4">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">采购价</span>
                                <span class="text-accent font-semibold">${p.currency}${p.price}</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">建议零售价</span>
                                <span class="text-gray-300">${p.retailCurrency}${p.retailPrice}</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">库存</span>
                                <span class="text-white">${p.stock} ${p.unit}</span>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); addToCart(${p.id})" class="w-full bg-primary hover:bg-primary/80 text-white py-2.5 rounded-xl font-medium transition-colors flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                            </svg>
                            加入采购单
                        </button>
                    </div>
                </div>
            `).join('');
        });

        // 页面加载时初始化商品数据
        function initProducts() {
            // 从 window.products（products-data-real.js 注入）初始化
            if (window.products && window.products.length > 0) {
                products = window.products;
                normalizeProducts();
                localStorage.setItem('overseastock_products', JSON.stringify(products));
            } else {
                // 从 localStorage 恢复
                const stored = localStorage.getItem('overseastock_products');
                if (stored) {
                    try {
                        products = JSON.parse(stored);
                        normalizeProducts();
                    } catch(e) {}
                }
            }
            renderProducts();
        }
        
        // Initial render
        initProducts();
    </script>
</body>
</html>
